<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #0a0c12;
  color: #dde3f0;
  display: flex;
  flex-direction: column;
}

/* ── HUB NAV ── */
#hub-nav {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 20px;
  height: 52px;
  background: #080b12;
  border-bottom: 1px solid #1e2535;
  flex-shrink: 0;
  z-index: 9999;
  position: relative;
}
.hub-logo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: #7c6dfa;
  letter-spacing: 0.06em;
  margin-right: 10px;
  white-space: nowrap;
}
.hub-logo span {
  color: #4a5670;
  font-weight: 400;
}
.hub-divider {
  width: 1px;
  height: 28px;
  background: #1e2535;
  margin: 0 6px;
}
.hub-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: #4a5670;
  border: 1px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
  background: none;
  font-family: 'Inter', sans-serif;
}
.hub-tab:hover {
  background: #0e1219;
  color: #8896b0;
  border-color: #1e2535;
}
.hub-tab.active {
  background: rgba(124,109,250,0.1);
  color: #a598ff;
  border-color: rgba(124,109,250,0.25);
}
.hub-tab .tab-icon { font-size: 15px; }
.hub-tab .tab-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  background: rgba(255,255,255,0.06);
  color: #4a5670;
  padding: 1px 6px;
  border-radius: 99px;
}
.hub-tab.active .tab-badge {
  background: rgba(124,109,250,0.15);
  color: #7c6dfa;
}

/* ── FRAME CONTAINER ── */
#frame-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.app-frame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
}
.app-frame.active {
  display: block;
}

/* ── LOADING SCREEN ── */
.frame-loading {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #080b12;
  gap: 14px;
  z-index: 10;
  transition: opacity 0.3s;
}
.frame-loading.hidden { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 32px; height: 32px;
  border: 2px solid #1e2535;
  border-top-color: #7c6dfa;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #4a5670;
  letter-spacing: 0.1em;
}
</style>
</head>
<body>

  </button>

    <span class="tab-icon">🎯</span>

    <span class="tab-badge">Dynamic</span>

  <button class="hub-tab" data-app="mains">
    <span class="tab-icon">📚</span>
    Mains Command
    <span class="tab-badge">Sessions</span>
  </button>
  <button class="hub-tab" data-app="writing">
    <span class="tab-icon">✍️</span>
    Writing Practice
    <span class="tab-badge">Answers</span>
  </button>
</nav>

<div id="frame-container">
  <div class="frame-loading" id="loading-prelims">
    <div class="loading-spinner"></div>
    <div class="loading-label">LOADING PRELIMS TRACKER</div>
  </div>
  <iframe class="app-frame active" id="frame-prelims" data-app="prelims"

<html lang=&quot;en&quot;>
<head>

<title>Prelims Register — UPSC Static Coverage Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&amp;family=Inter:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap');

:root{
  --paper:#F6F1E6;
  --paper-2:#EFE6D3;
  --paper-3:#FFFEFB;
  --ink:#2A2521;
  --ink-soft:#82776A;
  --navy:#2B3A55;
  --navy-2:#43577E;
  --saffron:#CC8A2E;
  --saffron-soft:#F5E4C7;
  --terracotta:#AE4A3A;
  --terracotta-soft:#F4DCD7;
  --sage:#52805A;
  --sage-soft:#E0EBE0;
  --line:#DDD0B6;
  --line-soft:#EBE2CC;
  --shadow:0 1px 2px rgba(43,40,30,.05);
  /* confidence colors */
  --conf1:#AE4A3A; --conf2:#CC8A2E; --conf3:#B07D2E; --conf4:#52805A; --conf5:#2B3A55;
}

*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background-color:var(--paper);
  background-image:radial-gradient(var(--line-soft) 1px, transparent 1px);
  background-size:24px 24px;
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
a{color:inherit}
::selection{background:var(--saffron-soft)}

/* ---------- Masthead ---------- */
.masthead{
  background:var(--navy);
  color:var(--paper);
  padding:16px clamp(16px,4vw,40px) 0;
  border-bottom:4px double var(--saffron);
}
.masthead-top{
  display:flex; align-items:center; justify-content:space-between; gap:28px; flex-wrap:wrap;
  padding-bottom:16px;
}
.masthead .titles{min-width:240px}
.eyebrow{
  font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase;
  color:#C9D2E3; margin-bottom:4px;
}
.masthead h1{
  font-family:'Source Serif 4',serif; font-weight:700; font-size:clamp(20px,3vw,28px); letter-spacing:.01em;
}
.masthead .sub{font-size:12px; color:#C9D2E3; margin-top:4px; max-width:46ch; line-height:1.5}

.statline{display:flex; align-items:center; gap:18px; flex-wrap:wrap}
.statline .nums{display:flex; gap:14px}
.statline .num{text-align:center}
.statline .num b{display:block; font-family:'Source Serif 4',serif; font-size:20px; font-weight:600}
.statline .num span{display:block; font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:#AEBBD2; margin-top:2px}

/* Seal / progress dial */
.seal{position:relative; width:78px; height:78px; flex-shrink:0}
.seal svg{transform:rotate(-90deg); width:100%; height:100%}
.seal circle{fill:none; stroke-width:6}
.seal .track{stroke:rgba(255,255,255,.14)}
.seal .fill{stroke:var(--saffron); stroke-linecap:round; transition:stroke-dashoffset .5s ease}
.seal .center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
.seal .center b{font-family:'Source Serif 4',serif; font-size:18px; font-weight:700; line-height:1}
.seal .center span{font-family:'IBM Plex Mono',monospace; font-size:7px; letter-spacing:.14em; color:#C9D2E3; margin-top:2px}

/* ---------- Streak bar ---------- */
.streak-bar{
  display:flex; align-items:center; gap:20px; flex-wrap:wrap;
  padding:10px 0 14px; border-top:1px solid rgba(255,255,255,.1); margin-top:10px;
}
.streak-chip{
  display:flex; align-items:center; gap:8px;
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:#C9D2E3;
}
.streak-chip .flame{font-size:16px}
.streak-chip b{color:#fff; font-size:14px}

/* Heatmap */
.heatmap-wrap{flex:1; overflow:hidden}
.heatmap-label{font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:#7A8FAE; margin-bottom:5px}
.heatmap{display:flex; gap:2px; align-items:flex-end}
.hm-col{display:flex; flex-direction:column; gap:2px}
.hm-cell{
  width:10px; height:10px; border-radius:2px; background:rgba(255,255,255,.06);
  cursor:default; transition:background .15s; position:relative;
}
.hm-cell[data-count=&quot;0&quot;]{background:rgba(255,255,255,.06)}
.hm-cell[data-count=&quot;1&quot;]{background:rgba(204,138,46,.3)}
.hm-cell[data-count=&quot;2&quot;]{background:rgba(204,138,46,.55)}
.hm-cell[data-count=&quot;3&quot;]{background:rgba(204,138,46,.75)}
.hm-cell[data-count=&quot;4&quot;]{background:rgba(204,138,46,.9)}
.hm-cell[data-count=&quot;5&quot;]{background:#CC8A2E}
.hm-cell:hover::after{
  content:attr(data-tip); position:absolute; bottom:13px; left:50%; transform:translateX(-50%);
  background:#1a2535; color:#e8ecf2; font-family:'IBM Plex Mono',monospace; font-size:9px;
  padding:3px 7px; border-radius:4px; white-space:nowrap; z-index:10; pointer-events:none;
}

/* ---------- Shell layout ---------- */
.shell{display:grid; grid-template-columns:266px 1fr; max-width:1380px; margin:0 auto}
@media (max-width:900px){ .shell{grid-template-columns:1fr} }

/* ---------- Sidebar ---------- */
.sidebar{
  padding:20px 16px 40px;
  border-right:1px solid var(--line);
  position:sticky; top:0; align-self:start; height:100vh; overflow-y:auto;
}
@media (max-width:900px){
  .sidebar{position:static; height:auto; border-right:none; border-bottom:1px solid var(--line)}
}
.search-box{position:relative; margin-bottom:14px}
.search-box input{
  width:100%; padding:9px 12px 9px 32px; border:1px solid var(--line); border-radius:7px;
  background:var(--paper-3); font-family:inherit; font-size:13px; color:var(--ink);
}
.search-box input:focus{outline:2px solid var(--navy-2); outline-offset:1px}
.search-box .ic{position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:13px; color:var(--ink-soft)}

.sidebar-label{
  font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--ink-soft); margin:18px 0 8px; padding-left:2px;
}
.sidebar-label:first-of-type{margin-top:4px}

.navlist{display:flex; flex-direction:column; gap:3px}
.navitem{
  display:flex; flex-direction:column; gap:5px; padding:8px 10px; border-radius:7px;
  cursor:pointer; border:1px solid transparent; transition:background .12s;
}
.navitem:hover{background:var(--paper-2)}
.navitem.active{background:var(--paper-3); border-color:var(--line); box-shadow:inset 3px 0 0 var(--saffron)}
.navitem .nrow{display:flex; justify-content:space-between; align-items:baseline; gap:8px}
.navitem .nname{font-size:13px; font-weight:500}
.navitem .ncount{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); white-space:nowrap}
.navitem .nbar{height:3px; background:var(--line-soft); border-radius:2px; overflow:hidden}
.navitem .nbar i{display:block; height:100%; background:var(--sage); border-radius:2px}

.pillrow{display:flex; gap:6px; flex-wrap:wrap}
.pill{
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; padding:5px 10px; border-radius:14px;
  border:1px solid var(--line); background:var(--paper-3); cursor:pointer; color:var(--ink-soft);
  transition:all .12s; letter-spacing:.02em;
}
.pill:hover{border-color:var(--navy-2)}
.pill.on{background:var(--navy); color:var(--paper); border-color:var(--navy)}

.sidebar-actions{margin-top:22px; display:flex; flex-direction:column; gap:6px; border-top:1px solid var(--line); padding-top:16px}
.btn{
  font-family:'IBM Plex Mono',monospace; font-size:11.5px; padding:8px 10px; border:1px solid var(--line);
  border-radius:7px; background:var(--paper-3); cursor:pointer; text-align:left; color:var(--ink);
  display:flex; align-items:center; gap:8px; transition:all .12s;
}
.btn:hover{border-color:var(--navy); color:var(--navy)}
.btn.danger:hover{border-color:var(--terracotta); color:var(--terracotta)}
.btn.primary{background:var(--navy); color:var(--paper); border-color:var(--navy)}
.btn.primary:hover{background:var(--navy-2); border-color:var(--navy-2); color:var(--paper)}
.btn .ic{font-size:13px}

/* Add-topic form */
.add-form{display:none; flex-direction:column; gap:9px; margin-top:8px; padding:12px; border:1px solid var(--line); border-radius:8px; background:var(--paper-2)}
.add-form.open{display:flex}
.add-form label{
  font-family:'IBM Plex Mono',monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.1em;
  color:var(--ink-soft); display:block; margin-bottom:4px;
}
.add-form input, .add-form select, .add-form textarea{
  width:100%; padding:7px 9px; border:1px solid var(--line); border-radius:6px; background:var(--paper-3);
  font-family:'Inter',sans-serif; font-size:12.5px; color:var(--ink);
}
.add-form textarea{min-height:54px; resize:vertical; font-family:'IBM Plex Mono',monospace; font-size:11.5px; line-height:1.5}
.add-form input:focus, .add-form select:focus, .add-form textarea:focus{outline:2px solid var(--navy-2); outline-offset:1px}
.add-form .form-actions{display:flex; gap:8px; margin-top:2px}
.add-form .form-actions .btn{flex:1; justify-content:center}

/* Delete / restore icon buttons */
.icon-btn{
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; padding:4px 10px; border:1px solid var(--line);
  border-radius:6px; background:var(--paper-3); cursor:pointer; color:var(--ink-soft); transition:all .12s;
  white-space:nowrap; flex-shrink:0;
}
.icon-btn:hover{border-color:var(--terracotta); color:var(--terracotta)}
.icon-btn.restore:hover{border-color:var(--sage); color:var(--sage)}
.custom-tag{
  font-size:9px; font-family:'IBM Plex Mono',monospace; color:var(--navy-2); border:1px solid var(--navy-2);
  padding:1px 6px; border-radius:8px; letter-spacing:.04em; white-space:nowrap;
}
.item.hidden-row{opacity:.72}
.item.hidden-row .item-row{align-items:center}

/* ---------- PYQ badge ---------- */
.pyq-badge{
  font-size:9px; font-family:'IBM Plex Mono',monospace; font-weight:600;
  background:#2B3A55; color:#F5E4C7; padding:1px 7px; border-radius:8px;
  letter-spacing:.04em; white-space:nowrap; border:1px solid #43577E;
}
.pyq-badge.high{
  background:var(--terracotta); color:#fff; border-color:var(--terracotta);
}

/* ---------- PYQ frequency tagging (panel) ---------- */
.pyq-select{display:flex; gap:6px; flex-wrap:wrap; align-items:center}
.pyq-pill{
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; padding:6px 12px; border-radius:14px;
  border:1px solid var(--line); background:var(--paper-3); cursor:pointer; color:var(--ink-soft);
  transition:all .12s; letter-spacing:.02em;
}
.pyq-pill:hover{border-color:var(--saffron); color:var(--ink)}
.pyq-pill.on{background:#2B3A55; color:#F5E4C7; border-color:#2B3A55}
.pyq-pill.on.high{background:var(--terracotta); border-color:var(--terracotta); color:#fff}
.pyq-hint{font-size:11px; color:var(--ink-soft); margin-top:6px; line-height:1.5}

/* ---------- Confidence color strip ---------- */
.conf-strip{
  width:4px; border-radius:0 0 0 8px; flex-shrink:0; align-self:stretch;
  border-top-left-radius:8px;
}

/* ---------- Main ---------- */
.main{padding:24px clamp(16px,4vw,40px) 90px}
.section{margin-bottom:36px}
.section-head{
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  border-bottom:2px solid var(--ink); padding-bottom:7px; margin-bottom:16px;
}
.section-head h2{font-family:'Source Serif 4',serif; font-size:21px; font-weight:600; flex:1}
.section-head .scount{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-soft); letter-spacing:.04em}
.mark-all-btn{
  font-family:'IBM Plex Mono',monospace; font-size:10px; padding:4px 10px;
  border:1px solid var(--line); border-radius:6px; background:var(--paper-3);
  cursor:pointer; color:var(--ink-soft); transition:all .12s; white-space:nowrap;
}
.mark-all-btn:hover{border-color:var(--sage); color:var(--sage); background:var(--sage-soft)}

/* ---------- Today's revision queue ---------- */
.queue-count-badge{
  font-family:'IBM Plex Mono',monospace; font-size:9px; background:var(--saffron); color:#fff;
  padding:1px 6px; border-radius:8px; margin-left:auto;
}
.queue-banner{
  display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
  background:var(--saffron-soft); border:1px solid var(--saffron); border-radius:10px;
  padding:14px 18px; margin-bottom:24px;
}
.queue-banner-text{font-size:13px; color:#8A5A12; line-height:1.5}
.queue-banner-text b{font-family:'Source Serif 4',serif; font-size:17px; font-weight:600}
.queue-banner-btn{
  font-family:'IBM Plex Mono',monospace; font-size:12px; padding:9px 18px;
  background:var(--navy); color:var(--paper); border:none; border-radius:7px; cursor:pointer;
  white-space:nowrap; transition:background .12s;
}
.queue-banner-btn:hover{background:var(--navy-2)}

.queue-item{
  display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap;
  padding:12px 14px; border:1px solid var(--line); border-radius:9px; background:var(--paper-3);
  margin-bottom:8px;
}
.queue-item-title{font-size:13.5px; font-weight:500; display:flex; gap:8px; align-items:baseline; flex-wrap:wrap}
.queue-item-meta{font-size:11px; color:var(--ink-soft); margin-top:4px; font-family:'IBM Plex Mono',monospace}
.queue-overdue{color:var(--terracotta); font-weight:600}
.queue-due-today{color:var(--saffron); font-weight:600}
.queue-item-actions{display:flex; align-items:center; gap:6px; flex-shrink:0}
.queue-rate-label{font-size:10px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; margin-right:4px; white-space:nowrap}
.queue-dot{
  width:26px; height:26px; border:1px solid var(--line); border-radius:6px; cursor:pointer;
  background:var(--paper-3); font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft);
  transition:all .12s;
}
.queue-dot[data-val=&quot;1&quot;]:hover{border-color:var(--conf1); color:var(--conf1); background:rgba(174,74,58,.06)}
.queue-dot[data-val=&quot;2&quot;]:hover{border-color:var(--conf2); color:var(--conf2); background:rgba(204,138,46,.06)}
.queue-dot[data-val=&quot;3&quot;]:hover{border-color:var(--conf3); color:var(--conf3); background:rgba(176,125,46,.06)}
.queue-dot[data-val=&quot;4&quot;]:hover{border-color:var(--conf4); color:var(--conf4); background:rgba(82,128,90,.06)}
.queue-dot[data-val=&quot;5&quot;]:hover{border-color:var(--conf5); color:var(--conf5); background:rgba(43,58,85,.06)}
.queue-progress{
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); margin-bottom:14px;
}

.subsection{margin-bottom:20px}
.subsection h3{
  font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.12em;
  color:var(--navy-2); font-weight:600; margin-bottom:9px; padding-left:2px;
}

/* ---------- Item card ---------- */
.item{
  display:flex;
  background:var(--paper-3); border:1px solid var(--line); border-radius:9px; margin-bottom:8px;
  box-shadow:var(--shadow); transition:border-color .15s, background .2s; overflow:hidden;
}
.item.done{background:var(--sage-soft); border-color:#CFE0CE}
.item-inner{flex:1; min-width:0}
.item-row{display:flex; gap:11px; align-items:flex-start; padding:11px 13px; cursor:pointer}
.chk{
  width:19px; height:19px; border:1.5px solid var(--line); border-radius:5px; flex-shrink:0; margin-top:1px;
  display:flex; align-items:center; justify-content:center; font-size:11px; background:var(--paper-3);
  color:transparent; transition:all .12s;
}
.chk:hover{border-color:var(--sage)}
.item.done .chk{background:var(--sage); border-color:var(--sage); color:#fff}
.item-body{flex:1; min-width:0}
.item-title{font-size:13.5px; font-weight:500; display:flex; flex-wrap:wrap; gap:7px; align-items:baseline; line-height:1.4}
.item.done .item-title .ttext{text-decoration:line-through; color:var(--ink-soft)}
.item-desc{font-size:12px; color:var(--ink-soft); margin-top:4px; line-height:1.5}
.tagrow{display:flex; gap:6px; align-items:center; margin-left:auto; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end}

.badge{font-size:10px; padding:2px 8px; border-radius:8px; font-weight:600; letter-spacing:.03em; white-space:nowrap}
.badge.h{background:var(--terracotta-soft); color:var(--terracotta)}
.badge.m{background:var(--saffron-soft); color:#8A5A12}
.badge.l{background:var(--sage-soft); color:var(--sage)}

/* Due for revision badge */
.due-badge{
  font-size:9px; font-family:'IBM Plex Mono',monospace; font-weight:600;
  background:#FDF3E3; color:#8A5A12; padding:1px 7px; border-radius:8px;
  letter-spacing:.04em; white-space:nowrap; border:1px solid var(--saffron);
  animation: pulse-badge 2s ease-in-out infinite;
}
@keyframes pulse-badge{0%,100%{opacity:1}50%{opacity:.65}}

.note-flag{
  font-size:9px; font-family:'IBM Plex Mono',monospace; color:var(--navy-2); border:1px solid var(--line);
  padding:1px 6px; border-radius:8px; letter-spacing:.04em; white-space:nowrap;
}
.conf-flag{font-size:9px; font-family:'IBM Plex Mono',monospace; white-space:nowrap; padding:1px 7px; border-radius:8px; border:1px solid transparent}
.conf-flag.cf1{color:var(--conf1); border-color:rgba(174,74,58,.25); background:rgba(174,74,58,.06)}
.conf-flag.cf2{color:var(--conf2); border-color:rgba(204,138,46,.25); background:rgba(204,138,46,.06)}
.conf-flag.cf3{color:var(--conf3); border-color:rgba(176,125,46,.25); background:rgba(176,125,46,.06)}
.conf-flag.cf4{color:var(--conf4); border-color:rgba(82,128,90,.25); background:rgba(82,128,90,.06)}
.conf-flag.cf5{color:var(--conf5); border-color:rgba(43,58,85,.25); background:rgba(43,58,85,.06)}

.rev-count{font-size:9px; font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); white-space:nowrap}

.chev{font-size:10px; color:var(--ink-soft); margin-top:3px; transition:transform .18s; flex-shrink:0}
.item.open .chev{transform:rotate(90deg)}

/* ---------- Expand panel ---------- */
.panel{display:none; padding:0 14px 16px 43px; border-top:1px dashed var(--line)}
.item.open .panel{display:block; padding-top:12px}
.panel-grid{display:grid; gap:12px}
.panel-label{
  font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.12em;
  color:var(--ink-soft); display:block; margin-bottom:7px;
}
.conf{display:flex; gap:6px; align-items:center; flex-wrap:wrap}
.conf .dot{
  width:24px; height:24px; border:1px solid var(--line); border-radius:5px; cursor:pointer;
  background:var(--paper-3); display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); transition:all .12s;
}
.conf .dot:hover{border-color:var(--saffron)}
.conf .dot.on{background:var(--saffron); border-color:var(--saffron); color:#fff}
.conf .clabel{font-size:11px; color:var(--ink-soft); margin-left:6px}

.panel textarea{
  width:100%; min-height:76px; border:1px solid var(--line); border-radius:7px; padding:10px;
  font-family:'IBM Plex Mono',monospace; font-size:12px; line-height:1.55; resize:vertical;
  background:#FFFDF7; color:var(--ink);
}
.panel textarea:focus{outline:2px solid var(--navy-2); outline-offset:1px}

/* Revision date row */
.rev-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.rev-row .rev-date-label{font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace}
.rev-row input[type=&quot;date&quot;]{
  padding:4px 8px; border:1px solid var(--line); border-radius:6px; background:var(--paper-3);
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink);
}
.rev-row input[type=&quot;date&quot;]:focus{outline:2px solid var(--navy-2); outline-offset:1px}

.panel-footer{display:flex; justify-content:space-between; align-items:center; margin-top:8px; flex-wrap:wrap; gap:8px}
.panel-footer .pf-left{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.updated{font-size:10.5px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace}
.save-hint{font-size:10.5px; color:var(--sage); font-family:'IBM Plex Mono',monospace; opacity:0; transition:opacity .3s}
.save-hint.show{opacity:1}
.pf-btn-row{display:flex; gap:6px; flex-wrap:wrap}

/* ---------- Analytics Panel ---------- */
.analytics-overlay{
  position:fixed; inset:0; background:rgba(26,37,53,.65); z-index:100;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .22s;
}
.analytics-overlay.open{opacity:1; pointer-events:auto}
.analytics-box{
  background:var(--paper-3); border:1px solid var(--line); border-radius:14px;
  width:min(720px, 96vw); max-height:88vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.22); padding:28px;
  transform:translateY(12px); transition:transform .22s;
}
.analytics-overlay.open .analytics-box{transform:translateY(0)}
.analytics-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:22px}
.analytics-head h2{font-family:'Source Serif 4',serif; font-size:22px; font-weight:600}
.analytics-close{font-family:'IBM Plex Mono',monospace; font-size:11px; padding:5px 10px; border:1px solid var(--line); border-radius:6px; background:var(--paper-3); cursor:pointer; color:var(--ink-soft)}
.analytics-close:hover{border-color:var(--terracotta); color:var(--terracotta)}

.analytics-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px}
@media(max-width:580px){.analytics-grid{grid-template-columns:1fr}}
.analytics-card{background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:16px}
.analytics-card h3{font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--ink-soft); margin-bottom:12px}
.analytics-card.full{grid-column:1/-1}

/* Subject completion bars */
.subj-bar-row{display:flex; align-items:center; gap:10px; margin-bottom:8px}
.subj-bar-name{font-size:12px; font-weight:500; min-width:130px}
.subj-bar-track{flex:1; height:8px; background:var(--line-soft); border-radius:4px; overflow:hidden}
.subj-bar-fill{height:100%; background:var(--sage); border-radius:4px; transition:width .4s ease}
.subj-bar-pct{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-soft); min-width:32px; text-align:right}

/* Confidence distribution */
.conf-dist{display:flex; gap:4px; align-items:flex-end; height:70px; margin-top:8px}
.conf-dist-bar{flex:1; border-radius:4px 4px 0 0; transition:height .4s; min-height:2px; position:relative}
.conf-dist-bar::after{
  content:attr(data-label); position:absolute; bottom:-18px; left:50%; transform:translateX(-50%);
  font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--ink-soft); white-space:nowrap;
}
.conf-dist-wrap{padding-bottom:22px}
.conf-dist-count{text-align:center; font-family:'IBM Plex Mono',monospace; font-size:9px; color:#fff; padding-top:3px}

/* Flagged list */
.flagged-list{display:flex; flex-direction:column; gap:7px; max-height:220px; overflow-y:auto}
.flagged-item{
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding:7px 10px; border:1px solid var(--line); border-radius:7px; background:var(--paper-3);
  font-size:12px;
}
.flagged-item .fi-title{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.flagged-item .fi-sub{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-soft); flex-shrink:0}

/* ---------- Flashcard mode ---------- */
.flashcard-overlay{
  position:fixed; inset:0; background:var(--navy); z-index:200;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.flashcard-overlay.open{opacity:1; pointer-events:auto}
.fc-header{
  position:absolute; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px clamp(16px,4vw,40px);
  border-bottom:1px solid rgba(255,255,255,.1);
}
.fc-header-title{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#7A8FAE}
.fc-header-right{display:flex; gap:12px; align-items:center}
.fc-counter{font-family:'IBM Plex Mono',monospace; font-size:12px; color:#C9D2E3}
.fc-close{
  font-family:'IBM Plex Mono',monospace; font-size:11px; padding:5px 12px;
  border:1px solid rgba(255,255,255,.2); border-radius:6px;
  color:#C9D2E3; cursor:pointer; background:transparent; transition:all .15s;
}
.fc-close:hover{background:rgba(255,255,255,.08); color:#fff}

.fc-card{
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:16px;
  width:min(560px,88vw); min-height:280px; padding:32px;
  display:flex; flex-direction:column; gap:16px; position:relative;
  transition:transform .15s, opacity .15s;
}
.fc-cat{font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#7A8FAE}
.fc-subject{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--saffron); margin-top:2px}
.fc-title{font-family:'Source Serif 4',serif; font-size:22px; font-weight:600; color:#fff; line-height:1.4; flex:1}
.fc-hint{
  font-size:13px; color:#C9D2E3; line-height:1.6;
  display:none; padding-top:14px; border-top:1px solid rgba(255,255,255,.1);
}
.fc-hint.shown{display:block}
.fc-reveal{
  font-family:'IBM Plex Mono',monospace; font-size:12px; padding:10px 20px;
  border:1px solid rgba(204,138,46,.4); border-radius:8px; color:var(--saffron);
  cursor:pointer; background:transparent; transition:all .15s; align-self:flex-start; margin-top:auto;
}
.fc-reveal:hover{background:rgba(204,138,46,.1); border-color:var(--saffron)}
.fc-reveal.hidden-btn{display:none}

.fc-controls{display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; justify-content:center}
.fc-btn{
  font-family:'IBM Plex Mono',monospace; font-size:12px; padding:10px 22px;
  border-radius:8px; cursor:pointer; transition:all .15s; border:1px solid transparent;
}
.fc-btn.skip{background:rgba(255,255,255,.06); color:#C9D2E3; border-color:rgba(255,255,255,.12)}
.fc-btn.skip:hover{background:rgba(255,255,255,.1)}
.fc-btn.got-it{background:rgba(82,128,90,.2); color:#8FC99A; border-color:rgba(82,128,90,.3)}
.fc-btn.got-it:hover{background:rgba(82,128,90,.3)}
.fc-btn.nope{background:rgba(174,74,58,.15); color:#E09088; border-color:rgba(174,74,58,.25)}
.fc-btn.nope:hover{background:rgba(174,74,58,.25)}
.fc-progress{
  position:absolute; bottom:0; left:0; height:3px; background:var(--saffron); border-radius:0 0 16px 16px;
  transition:width .3s;
}
.fc-empty{text-align:center; color:#C9D2E3; padding:20px}
.fc-empty h3{font-family:'Source Serif 4',serif; font-size:22px; color:#fff; margin-bottom:8px}

/* ---------- Empty state ---------- */
.empty{padding:60px 20px; text-align:center; color:var(--ink-soft)}
.empty .ic{font-size:30px; margin-bottom:10px}
.empty h3{font-family:'Source Serif 4',serif; font-size:18px; color:var(--ink); margin-bottom:6px; font-weight:600}
.empty p{font-size:13px; max-width:40ch; margin:0 auto; line-height:1.6}

/* ---------- Toast ---------- */
.toast{
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
  background:var(--navy); color:var(--paper); padding:10px 18px; border-radius:8px; font-size:12.5px;
  font-family:'IBM Plex Mono',monospace; box-shadow:0 6px 20px rgba(0,0,0,.18); transition:all .25s; z-index:300;
  pointer-events:none; letter-spacing:.02em; display:flex; align-items:center; gap:12px;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto}
.toast-undo{
  font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:600; letter-spacing:.06em;
  text-transform:uppercase; color:var(--saffron); background:transparent; border:1px solid rgba(255,255,255,.3);
  border-radius:5px; padding:3px 9px; cursor:pointer; white-space:nowrap; display:none; transition:all .12s;
}
.toast-undo:hover{border-color:var(--saffron); background:rgba(255,255,255,.06)}
.toast.has-undo .toast-undo{display:inline-block}

.sr-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0)}
</style>
</head>
<body>

<header class=&quot;masthead&quot;>
  <div class=&quot;masthead-top&quot;>
    <div class=&quot;titles&quot;>
      <div class=&quot;eyebrow&quot;>Static Preparation Register</div>
      <h1>UPSC Prelims Coverage Tracker</h1>
      <p class=&quot;sub&quot;>Tick off topics, rate recall, schedule revisions — everything in one place.</p>
    </div>
    <div class=&quot;statline&quot;>
      <div class=&quot;nums&quot;>
        <div class=&quot;num&quot;><b id=&quot;sTotal&quot;>0</b><span>Total</span></div>

      </div>
      <div class=&quot;seal&quot;>
        <svg viewBox=&quot;0 0 80 80&quot;>
          <circle class=&quot;track&quot; cx=&quot;40&quot; cy=&quot;40&quot; r=&quot;34&quot;></circle>
          <circle class=&quot;fill&quot; id=&quot;sealFill&quot; cx=&quot;40&quot; cy=&quot;40&quot; r=&quot;34&quot; stroke-dasharray=&quot;213&quot; stroke-dashoffset=&quot;213&quot;></circle>
        </svg>

</header>

<div class=&quot;shell&quot;>
  <aside class=&quot;sidebar&quot;>
    <div class=&quot;search-box&quot;>
      <span class=&quot;ic&quot;>⌕</span>
      <input type=&quot;text&quot; id=&quot;searchInput&quot; placeholder=&quot;Search topics, subtopics, keywords…&quot; autocomplete=&quot;off&quot;>
    </div>

    <div class=&quot;sidebar-label&quot;>Subjects</div>
    <div class=&quot;navlist&quot; id=&quot;catNav&quot;></div>

    <div class=&quot;sidebar-label&quot;>Quick views</div>
    <div class=&quot;navlist&quot; id=&quot;specialNav&quot;></div>

    <div class=&quot;sidebar-label&quot;>Priority</div>

    <div class=&quot;sidebar-actions&quot;>

      <button class=&quot;btn&quot; id=&quot;queueBtn&quot;><span class=&quot;ic&quot;>📋</span> Today's Revision Queue<span class=&quot;queue-count-badge&quot; id=&quot;queueCountBadge&quot;></span></button>
      <button class=&quot;btn&quot; id=&quot;analyticsBtn&quot;><span class=&quot;ic&quot;>📊</span> Analytics</button>
      <button class=&quot;btn&quot; id=&quot;addTopicBtn&quot;><span class=&quot;ic&quot;>＋</span> Add a topic</button>
      <div class=&quot;add-form&quot; id=&quot;addForm&quot;>
        <div>
          <label for=&quot;newCat&quot;>Subject</label>
          <select id=&quot;newCat&quot;></select>
        </div>
        <div>
          <label for=&quot;newSub&quot;>Subtopic / section</label>
          <input type=&quot;text&quot; id=&quot;newSub&quot; list=&quot;subList&quot; placeholder=&quot;e.g. Constitutional basics&quot; autocomplete=&quot;off&quot;>
          <datalist id=&quot;subList&quot;></datalist>
        </div>
        <div>
          <label for=&quot;newTitle&quot;>Topic title</label>
          <input type=&quot;text&quot; id=&quot;newTitle&quot; placeholder=&quot;e.g. New committee — key recommendations&quot; autocomplete=&quot;off&quot;>
        </div>
        <div>
          <label for=&quot;newDesc&quot;>What to cover (optional)</label>
          <textarea id=&quot;newDesc&quot; placeholder=&quot;Short description of what this topic involves&quot;></textarea>
        </div>
        <div>
          <label for=&quot;newPri&quot;>Priority</label>
          <select id=&quot;newPri&quot;>
            <option value=&quot;h&quot;>Must</option>
            <option value=&quot;m&quot; selected>Important</option>

          <button class=&quot;btn&quot; id=&quot;addSubmit&quot;>Add topic</button>

      </div>
      <button class=&quot;btn&quot; id=&quot;exportBtn&quot;><span class=&quot;ic&quot;>⭳</span> Export progress &amp;amp; notes</button>
      <button class=&quot;btn&quot; id=&quot;importBtn&quot;><span class=&quot;ic&quot;>⭱</span> Import backup file</button>
      <input type=&quot;file&quot; id=&quot;importFile&quot; accept=&quot;application/json&quot; style=&quot;display:none&quot;>
      <button class=&quot;btn danger&quot; id=&quot;resetBtn&quot;><span class=&quot;ic&quot;>⟲</span> Reset all progress</button>
    </div>
  </aside>

  <main class=&quot;main&quot;>
    <div id=&quot;mainContent&quot;></div>
  </main>
</div>

<div class=&quot;toast&quot; id=&quot;toast&quot;><span id=&quot;toastMsg&quot;></span><button class=&quot;toast-undo&quot; id=&quot;toastUndoBtn&quot;>Undo</button></div>

<!-- Today's Revision Queue overlay -->
<div class=&quot;analytics-overlay&quot; id=&quot;queueOverlay&quot;>
  <div class=&quot;analytics-box&quot;>
    <div class=&quot;analytics-head&quot;>
      <h2>📋 Today's Revision Queue</h2>
      <button class=&quot;analytics-close&quot; id=&quot;queueClose&quot;>Close ✕</button>

<!-- Analytics overlay -->

  <div class=&quot;analytics-box&quot;>
    <div class=&quot;analytics-head&quot;>
      <h2>📊 Analytics</h2>
      <button class=&quot;analytics-close&quot; id=&quot;analyticsClose&quot;>Close ✕</button>

    <div class=&quot;analytics-grid&quot; id=&quot;analyticsGrid&quot;></div>

<!-- Flashcard overlay -->

  <div id=&quot;fcContent&quot;></div>

/* ====================== SPACED REPETITION CONFIG ====================== */
// Days until next revision based on confidence level
const SR_INTERVALS = { 0: 1, 1: 1, 2: 3, 3: 7, 4: 21, 5: 60 };

/* ====================== STATE ====================== */
const STORE_KEY = &quot;upsc_prelims_register_v2&quot;;

const ITEMS_ORIGINAL = DATA.map((d, i) => ({ ...d, id: &quot;it&quot; + i, custom: false }));

let state = loadState();
state.custom = state.custom || [];
state.hidden = state.hidden || {};
state.activity = state.activity || {}; // date -> count

let filters = { cat: &quot;all&quot;, special: null, pri: &quot;all&quot;, status: &quot;all&quot;, q: &quot;&quot; };

let ITEMS = [];
function allItemsRaw() {
  const custom = state.custom.map(c => ({ ...c, custom: true }));
  return [...ITEMS_ORIGINAL, ...custom];
}
function refreshItems() {
  ITEMS = allItemsRaw().filter(i => !state.hidden[i.id]);
}

function loadState() {
  try {
    const stored = JSON.parse(localStorage.getItem(STORE_KEY));
    if (!stored) {
      // Try migrating from old key
      const old = JSON.parse(localStorage.getItem(&quot;upsc_prelims_register_v1&quot;));
      return old || {};
    }
    return stored;
  } catch (e) { return {}; }
}
function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch (e) { console.error(&quot;Could not save progress:&quot;, e); }
}
function getRec(id) {
  return state[id] || { done: false, note: &quot;&quot;, conf: 0, updated: null, revCount: 0, nextRev: null, pyqFreq: 0 };
}
function setRec(id, patch) {
  const cur = getRec(id);
  state[id] = { ...cur, ...patch, updated: new Date().toISOString() };
  saveState();
}

/* ====================== HELPERS ====================== */
function todayStr() { return new Date().toISOString().slice(0, 10); }
function fmtDate(iso) {
  if (!iso) return &quot;Not yet reviewed&quot;;
  const d = new Date(iso);
  const months = [&quot;Jan&quot;,&quot;Feb&quot;,&quot;Mar&quot;,&quot;Apr&quot;,&quot;May&quot;,&quot;Jun&quot;,&quot;Jul&quot;,&quot;Aug&quot;,&quot;Sep&quot;,&quot;Oct&quot;,&quot;Nov&quot;,&quot;Dec&quot;];
  return `Updated ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtShortDate(iso) {
  if (!iso) return &quot;&quot;;
  const d = new Date(iso);
  const months = [&quot;Jan&quot;,&quot;Feb&quot;,&quot;Mar&quot;,&quot;Apr&quot;,&quot;May&quot;,&quot;Jun&quot;,&quot;Jul&quot;,&quot;Aug&quot;,&quot;Sep&quot;,&quot;Oct&quot;,&quot;Nov&quot;,&quot;Dec&quot;];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}
function esc(str) {
  return String(str).replace(/[&amp;<>&quot;']/g, c => ({
    &quot;&amp;&quot;:&quot;&amp;amp;&quot;,&quot;<&quot;:&quot;&amp;lt;&quot;,&quot;>&quot;:&quot;&amp;gt;&quot;,'&quot;':&quot;&amp;quot;&quot;,&quot;'&quot;:&quot;&amp;#39;&quot;
  }[c]));
}
let toastTimer;
function toast(msg, undoFn) {
  const el = document.getElementById(&quot;toast&quot;);
  const msgEl = document.getElementById(&quot;toastMsg&quot;);
  const undoBtn = document.getElementById(&quot;toastUndoBtn&quot;);
  msgEl.textContent = msg;
  el.classList.add(&quot;show&quot;);
  clearTimeout(toastTimer);

  // Reset any previous undo handler
  undoBtn.replaceWith(undoBtn.cloneNode(true));
  const freshUndoBtn = document.getElementById(&quot;toastUndoBtn&quot;);

  if (undoFn) {
    el.classList.add(&quot;has-undo&quot;);
    freshUndoBtn.addEventListener(&quot;click&quot;, () => {
      undoFn();
      clearTimeout(toastTimer);
      el.classList.remove(&quot;show&quot;, &quot;has-undo&quot;);
    });
    toastTimer = setTimeout(() => el.classList.remove(&quot;show&quot;, &quot;has-undo&quot;), 6000);
  } else {
    el.classList.remove(&quot;has-undo&quot;);
    toastTimer = setTimeout(() => el.classList.remove(&quot;show&quot;), 2200);
  }
}

function recordActivity() {
  const today = todayStr();
  state.activity[today] = (state.activity[today] || 0) + 1;
  saveState();
}

function calcNextRev(conf) {
  const days = SR_INTERVALS[conf] || 1;
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function isDueForRevision(rec) {
  if (!rec.done &amp;&amp; !rec.nextRev) return false;
  if (!rec.nextRev) return false;
  return rec.nextRev <= todayStr();
}

/* ====================== STREAK ====================== */
function calcStreak() {
  const today = new Date();
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    if (state.activity[key] &amp;&amp; state.activity[key] > 0) {
      streak++;
    } else if (i > 0) {
      break;
    }
  }
  return streak;
}

/* ====================== FILTERING ====================== */
function matchesFilters(item) {
  const rec = getRec(item.id);

  if (filters.special === &quot;notes&quot; &amp;&amp; !(rec.note &amp;&amp; rec.note.trim())) return false;
  if (filters.special === &quot;revision&quot; &amp;&amp; !(rec.conf >= 1 &amp;&amp; rec.conf <= 2)) return false;
  if (filters.special === &quot;due&quot;) {
    if (!isDueForRevision(rec) &amp;&amp; !(rec.conf >= 1 &amp;&amp; rec.conf <= 2 &amp;&amp; !rec.nextRev)) return false;
  }
  if (filters.special === &quot;pyq&quot;) {
    if (!((getRec(item.id).pyqFreq || 0) >= 1)) return false;
  }
  if (filters.special === &quot;flashcard&quot;) {
    if (rec.done &amp;&amp; rec.conf >= 3) return false;
  }

  if (!filters.special &amp;&amp; filters.cat !== &quot;all&quot; &amp;&amp; item.cat !== filters.cat) return false;

  if (filters.pri !== &quot;all&quot; &amp;&amp; item.p !== filters.pri) return false;
  if (filters.status === &quot;done&quot; &amp;&amp; !rec.done) return false;
  if (filters.status === &quot;pending&quot; &amp;&amp; rec.done) return false;

  if (filters.q) {
    const q = filters.q.toLowerCase();
    const hay = (item.t + &quot; &quot; + item.s + &quot; &quot; + item.sub).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function getFiltered() { return ITEMS.filter(matchesFilters); }

/* ====================== STATS ====================== */
function overallStats() {
  const total = ITEMS.length;
  const done = ITEMS.filter(i => getRec(i.id).done).length;
  const due = ITEMS.filter(i => isDueForRevision(getRec(i.id))).length;
  return { total, done, left: total - done, due, pct: total ? Math.round((done / total) * 100) : 0 };
}
function catStats(cat) {
  const items = ITEMS.filter(i => i.cat === cat);
  const done = items.filter(i => getRec(i.id).done).length;
  return { total: items.length, done };
}
function dueItemsForCat(cat) {
  return ITEMS.filter(i => i.cat === cat &amp;&amp; isDueForRevision(getRec(i.id))).length;
}

/* ====================== HEATMAP ====================== */
function renderHeatmap() {
  const hm = document.getElementById(&quot;heatmap&quot;);
  const weeks = 16;
  const today = new Date();
  // Find start date (weeks*7 days ago, aligned to week start)
  const startDate = new Date(today);
  startDate.setDate(startDate.getDate() - weeks * 7 + 1);

  let html = &quot;&quot;;
  for (let w = 0; w < weeks; w++) {
    html += '<div class=&quot;hm-col&quot;>';
    for (let d = 0; d < 7; d++) {
      const date = new Date(startDate);
      date.setDate(startDate.getDate() + w * 7 + d);
      const key = date.toISOString().slice(0, 10);
      const count = state.activity[key] || 0;
      const level = Math.min(count, 5);
      const label = date.toISOString().slice(0, 10) + &quot;: &quot; + count + &quot; reviewed&quot;;
      html += `<div class=&quot;hm-cell&quot; data-count=&quot;${level}&quot; data-tip=&quot;${label}&quot;></div>`;
    }
    html += '</div>';
  }
  hm.innerHTML = html;

  // Today count
  const todayCount = state.activity[todayStr()] || 0;
  document.getElementById(&quot;todayCount&quot;).textContent = todayCount;
  document.getElementById(&quot;streakCount&quot;).textContent = calcStreak();
}

/* ====================== SIDEBAR ====================== */
function renderSidebar() {
  const catNav = document.getElementById(&quot;catNav&quot;);
  let html = &quot;&quot;;

  const allStats = overallStats();
  html += navItemHTML({
    active: filters.cat === &quot;all&quot; &amp;&amp; !filters.special,

    done: allStats.done, total: allStats.total,
    onclick: &quot;setCat('all')&quot;
  });

  Object.entries(CATS).forEach(([key, meta]) => {
    const s = catStats(key);
    if (!s.total) return;
    const due = dueItemsForCat(key);
    html += navItemHTML({
      active: filters.cat === key &amp;&amp; !filters.special,
      name: `${meta.icon} ${meta.label}`,
      done: s.done, total: s.total,
      onclick: `setCat('${key}')`,
      dueCount: due
    });
  });
  catNav.innerHTML = html;

  // Special views
  const specialNav = document.getElementById(&quot;specialNav&quot;);
  const notesCount = ITEMS.filter(i => { const r = getRec(i.id); return r.note &amp;&amp; r.note.trim(); }).length;
  const revisionCount = ITEMS.filter(i => { const r = getRec(i.id); return r.conf >= 1 &amp;&amp; r.conf <= 2; }).length;
  const dueCount = ITEMS.filter(i => isDueForRevision(getRec(i.id))).length;
  const pyqCount = ITEMS.filter(i => (getRec(i.id).pyqFreq || 0) >= 1).length;
  const hiddenCount = Object.keys(state.hidden).filter(id => state.hidden[id]).length;

  specialNav.innerHTML =
    navItemHTML({ active: filters.special === &quot;due&quot;, name: &quot;🔔 Due for Revision&quot;, done: dueCount, total: null, onclick: &quot;setSpecial('due')&quot;, soloCount: dueCount }) +
    navItemHTML({ active: filters.special === &quot;pyq&quot;, name: &quot;⭐ My PYQ Tags&quot;, done: pyqCount, total: null, onclick: &quot;setSpecial('pyq')&quot;, soloCount: pyqCount }) +
    navItemHTML({ active: filters.special === &quot;notes&quot;, name: &quot;📝 My Notes&quot;, done: notesCount, total: null, onclick: &quot;setSpecial('notes')&quot;, soloCount: notesCount }) +
    navItemHTML({ active: filters.special === &quot;revision&quot;, name: &quot;⚠ Needs Revision&quot;, done: revisionCount, total: null, onclick: &quot;setSpecial('revision')&quot;, soloCount: revisionCount }) +
    navItemHTML({ active: filters.special === &quot;hidden&quot;, name: &quot;🗑 Hidden Topics&quot;, done: hiddenCount, total: null, onclick: &quot;setSpecial('hidden')&quot;, soloCount: hiddenCount });

  // Priority pills
  document.getElementById(&quot;priFilters&quot;).innerHTML =
    [[&quot;all&quot;,&quot;All&quot;],[&quot;h&quot;,&quot;Must&quot;],[&quot;m&quot;,&quot;Important&quot;],[&quot;l&quot;,&quot;Extra&quot;]]
      .map(([v,l]) => `<button class=&quot;pill ${filters.pri===v?&quot;on&quot;:&quot;&quot;}&quot; onclick=&quot;setPri('${v}')&quot;>${l}</button>`)
      .join(&quot;&quot;);

  // Status pills
  document.getElementById(&quot;statusFilters&quot;).innerHTML =
    [[&quot;all&quot;,&quot;All&quot;],[&quot;pending&quot;,&quot;Pending&quot;],[&quot;done&quot;,&quot;Done&quot;]]
      .map(([v,l]) => `<button class=&quot;pill ${filters.status===v?&quot;on&quot;:&quot;&quot;}&quot; onclick=&quot;setStatus('${v}')&quot;>${l}</button>`)
      .join(&quot;&quot;);

function navItemHTML({ active, name, done, total, onclick, soloCount, dueCount }) {
  const countLabel = total !== null &amp;&amp; total !== undefined ? `${done}/${total}` : `${soloCount}`;
  const pct = total ? Math.round((done / total) * 100) : 0;
  const bar = total !== null &amp;&amp; total !== undefined ? `<div class=&quot;nbar&quot;><i style=&quot;width:${pct}%&quot;></i></div>` : &quot;&quot;;
  const dueBadge = dueCount ? `<span style=&quot;font-family:'IBM Plex Mono',monospace;font-size:9px;background:rgba(204,138,46,.2);color:#8A5A12;padding:1px 5px;border-radius:6px;margin-left:4px&quot;>↻${dueCount}</span>` : &quot;&quot;;
  return `<div class=&quot;navitem ${active?&quot;active&quot;:&quot;&quot;}&quot; onclick=&quot;${onclick}&quot;>
    <div class=&quot;nrow&quot;><span class=&quot;nname&quot;>${name}${dueBadge}</span><span class=&quot;ncount&quot;>${countLabel}</span></div>
    ${bar}
  </div>`;
}

/* ====================== FILTER ACTIONS ====================== */
function setCat(cat) { filters.cat = cat; filters.special = null; renderAll(); }
function setSpecial(sp) { filters.special = filters.special === sp ? null : sp; renderAll(); }
function setPri(p) { filters.pri = p; renderAll(); }
function setStatus(s) { filters.status = s; renderAll(); }

/* ====================== MARK ALL DONE ====================== */
function markAllDone(cat) {
  const items = ITEMS.filter(i => i.cat === cat);
  const allDone = items.every(i => getRec(i.id).done);
  const today = todayStr();
  items.forEach(i => {
    const rec = getRec(i.id);
    const wasDone = rec.done;
    const newDone = !allDone;
    const newRevCount = newDone &amp;&amp; !wasDone ? (rec.revCount || 0) + 1 : rec.revCount || 0;
    const nextRev = newDone &amp;&amp; !wasDone ? calcNextRev(rec.conf) : rec.nextRev;
    setRec(i.id, { done: newDone, revCount: newRevCount, nextRev });
    if (newDone &amp;&amp; !wasDone) {
      state.activity[today] = (state.activity[today] || 0) + 1;
    }
  });
  saveState();
  renderAll();
  toast(allDone ? &quot;All topics unmarked&quot; : `${items.length} topics marked done — revision scheduled`);
}

/* ====================== MAIN CONTENT ====================== */
function renderMain() {
  const container = document.getElementById(&quot;mainContent&quot;);
  if (filters.special === &quot;hidden&quot;) { renderHiddenView(container); return; }

  const banner = renderQueueBanner();
  const filtered = getFiltered();
  if (!filtered.length) {
    container.innerHTML = banner + `<div class=&quot;empty&quot;>
      <div class=&quot;ic&quot;>🔍</div>
      <h3>No topics match this view</h3>
      <p>Try clearing the search, switching subjects, or adjusting the priority and status filters.</p>
    </div>`;
    bindQueueBanner();
    return;
  }

  const catOrder = [];
  const grouped = {};
  filtered.forEach(item => {
    if (!grouped[item.cat]) { grouped[item.cat] = {}; catOrder.push(item.cat); }
    if (!grouped[item.cat][item.sub]) grouped[item.cat][item.sub] = [];
    grouped[item.cat][item.sub].push(item);
  });

  let html = banner;
  catOrder.forEach(cat => {
    const meta = CATS[cat] || { label: cat, icon: &quot;•&quot; };
    const subs = grouped[cat];
    const subKeys = Object.keys(subs);
    const totalInCat = subKeys.reduce((n, s) => n + subs[s].length, 0);
    const doneInCat = subKeys.reduce((n, s) => n + subs[s].filter(i => getRec(i.id).done).length, 0);

    html += `<section class=&quot;section&quot;>
      <div class=&quot;section-head&quot;>
        <h2>${meta.icon} ${meta.label}</h2>
        <span class=&quot;scount&quot;>${doneInCat} / ${totalInCat} done</span>
        <button class=&quot;mark-all-btn&quot; onclick=&quot;markAllDone('${cat}')&quot;>
          ${ITEMS.filter(i=>i.cat===cat).every(i=>getRec(i.id).done) ? &quot;↺ Unmark all&quot; : &quot;✓ Mark all done&quot;}
        </button>
      </div>`;

    subKeys.forEach(sub => {
      html += `<div class=&quot;subsection&quot;><h3>${esc(sub)}</h3>${subs[sub].map(itemHTML).join(&quot;&quot;)}</div>`;
    });
    html += `</section>`;
  });

  container.innerHTML = html;
  attachItemHandlers();
  bindQueueBanner();
}

function bindQueueBanner() {
  const btn = document.getElementById(&quot;queueBannerBtn&quot;);
  if (btn) btn.addEventListener(&quot;click&quot;, openTodayQueue);
}


function renderHiddenView(container) {
  const hiddenItems = allItemsRaw().filter(i => state.hidden[i.id]);
  if (!hiddenItems.length) {
    container.innerHTML = `<div class=&quot;empty&quot;><div class=&quot;ic&quot;>🗑</div><h3>No hidden topics</h3><p>Topics you remove from your list show up here so you can bring them back any time.</p></div>`;
    return;
  }
  let html = `<section class=&quot;section&quot;><div class=&quot;section-head&quot;><h2>🗑 Hidden topics</h2><span class=&quot;scount&quot;>${hiddenItems.length} hidden</span></div>`;
  hiddenItems.forEach(item => {
    const meta = CATS[item.cat] || { label: item.cat, icon: &quot;•&quot; };
    html += `<div class=&quot;item hidden-row&quot; data-id=&quot;${item.id}&quot;>
      <div class=&quot;item-inner&quot;><div class=&quot;item-row&quot;>
        <div class=&quot;item-body&quot;>
          <div class=&quot;item-title&quot;><span class=&quot;ttext&quot;>${esc(item.t)}</span>
            <span class=&quot;tagrow&quot;>${item.custom?'<span class=&quot;custom-tag&quot;>custom</span>':&quot;&quot;}<span class=&quot;note-flag&quot;>${meta.icon} ${esc(item.sub)}</span></span>
          </div>
          <div class=&quot;item-desc&quot;>${esc(item.s)}</div>
        </div>
        <button class=&quot;icon-btn restore&quot; data-role=&quot;restore-item&quot;>Restore</button>
      </div></div>
    </div>`;
  });
  html += `</section>`;
  container.innerHTML = html;
  container.querySelectorAll('[data-role=&quot;restore-item&quot;]').forEach(btn => {
    btn.addEventListener(&quot;click&quot;, () => {
      const id = btn.closest(&quot;.item&quot;).dataset.id;
      delete state.hidden[id];
      saveState();
      renderAll();
      toast(&quot;Topic restored to your list&quot;);
    });
  });
}

function confStripColor(conf) {
  if (!conf) return &quot;var(--line)&quot;;
  const colors = { 1:&quot;var(--conf1)&quot;, 2:&quot;var(--conf2)&quot;, 3:&quot;var(--conf3)&quot;, 4:&quot;var(--conf4)&quot;, 5:&quot;var(--conf5)&quot; };
  return colors[conf] || &quot;var(--line)&quot;;
}

function pyqBadgeHTML(freq) {
  if (freq === 1) return '<span class=&quot;pyq-badge&quot;>⭐ PYQ</span>';
  if (freq >= 2) return '<span class=&quot;pyq-badge high&quot;>⭐⭐ High PYQ</span>';
  return &quot;&quot;;
}

function pyqLabel(freq) {
  switch (freq) {
    case 1: return &quot;Has come up in PYQs&quot;;
    case 2: return &quot;Frequently asked in PYQs&quot;;
    default: return &quot;Not tagged&quot;;
  }
}

function confLabel(conf) {
  switch(conf) {
    case 1: return &quot;Forgot it — revisit today&quot;;
    case 2: return &quot;Shaky — revisit in 3 days&quot;;
    case 3: return &quot;Okay — revisit in 1 week&quot;;
    case 4: return &quot;Confident — revisit in 3 weeks&quot;;
    case 5: return &quot;Mastered — revisit in 2 months&quot;;
    default: return &quot;Not yet rated&quot;;
  }
}

/* ====================== ITEM INTERACTIONS ====================== */
function attachItemHandlers() {
  document.querySelectorAll(&quot;.item&quot;).forEach(el => {
    const id = el.dataset.id;

    // Toggle done
    el.querySelector('[data-role=&quot;toggle-done&quot;]').addEventListener(&quot;click&quot;, e => {
      e.stopPropagation();
      const rec = getRec(id);
      const prevRec = { ...rec }; // snapshot for undo
      const today = todayStr();
      const prevActivityCount = state.activity[today] || 0;
      const newDone = !rec.done;
      const newRevCount = newDone ? (rec.revCount || 0) + 1 : rec.revCount || 0;
      const nextRev = newDone ? calcNextRev(rec.conf || 0) : rec.nextRev;
      setRec(id, { done: newDone, revCount: newRevCount, nextRev });
      if (newDone) recordActivity();
      renderAll();

      const msg = newDone
        ? `Marked done — next review in ${SR_INTERVALS[rec.conf || 0]} day${SR_INTERVALS[rec.conf || 0] > 1 ? &quot;s&quot; : &quot;&quot;}`
        : &quot;Marked not done&quot;;

      toast(msg, () => {
        state[id] = prevRec;
        if (newDone) state.activity[today] = prevActivityCount;
        saveState();
        renderAll();
        toast(&quot;Undone&quot;);
      });
    });

    // Toggle expand
    el.querySelector('[data-role=&quot;toggle-open&quot;]').addEventListener(&quot;click&quot;, e => {
      if (e.target.closest('[data-role=&quot;toggle-done&quot;]')) return;
      el.classList.toggle(&quot;open&quot;);
    });

    // Confidence dots
    el.querySelectorAll('[data-role=&quot;conf&quot;] .dot').forEach(dot => {
      dot.addEventListener(&quot;click&quot;, e => {
        e.stopPropagation();
        const val = parseInt(dot.dataset.val, 10);
        const rec = getRec(id);
        const newVal = rec.conf === val ? 0 : val;
        const nextRev = calcNextRev(newVal);
        setRec(id, { conf: newVal, nextRev });
        // Live update dots + label + strip
        const confWrap = el.querySelector('[data-role=&quot;conf&quot;]');
        confWrap.querySelectorAll(&quot;.dot&quot;).forEach(d => {
          d.classList.toggle(&quot;on&quot;, newVal >= parseInt(d.dataset.val, 10));
        });
        confWrap.querySelector(&quot;.clabel&quot;).textContent = confLabel(newVal);
        el.querySelector('[data-role=&quot;updated&quot;]').textContent = fmtDate(getRec(id).updated);
        el.querySelector('.conf-strip').style.background = confStripColor(newVal);
        // Update date input
        const dateInput = el.querySelector('[data-role=&quot;rev-date&quot;]');
        if (dateInput) dateInput.value = nextRev;
        flashSaved(el);
        updateSidebarCounts();
        recordActivity();
      });
    });

    // Revision date manual override
    const revDate = el.querySelector('[data-role=&quot;rev-date&quot;]');
    if (revDate) {
      revDate.addEventListener(&quot;change&quot;, e => {
        e.stopPropagation();
        setRec(id, { nextRev: revDate.value || null });
        flashSaved(el);
        updateSidebarCounts();
      });
      revDate.addEventListener(&quot;click&quot;, e => e.stopPropagation());
    }

    // PYQ frequency tagging
    const pyqSelect = el.querySelector('[data-role=&quot;pyq-select&quot;]');
    if (pyqSelect) {
      pyqSelect.querySelectorAll(&quot;.pyq-pill&quot;).forEach(pill => {
        pill.addEventListener(&quot;click&quot;, e => {
          e.stopPropagation();
          const val = parseInt(pill.dataset.val, 10);
          const rec = getRec(id);
          const newVal = rec.pyqFreq === val ? 0 : val;
          setRec(id, { pyqFreq: newVal });
          // Live update pills
          pyqSelect.querySelectorAll(&quot;.pyq-pill&quot;).forEach(p => {
            p.classList.toggle(&quot;on&quot;, parseInt(p.dataset.val, 10) === newVal);
          });
          el.querySelector('[data-role=&quot;pyq-hint&quot;]').textContent = pyqLabel(newVal);
          // Live update badge in title row
          el.querySelector('[data-role=&quot;pyq-badge-slot&quot;]').innerHTML = pyqBadgeHTML(newVal);
          el.querySelector('[data-role=&quot;updated&quot;]').textContent = fmtDate(getRec(id).updated);
          flashSaved(el);
          updateSidebarCounts();
        });
      });
    }

    // Notes textarea
    const textarea = el.querySelector('[data-role=&quot;note&quot;]');
    let debounceTimer;
    textarea.addEventListener(&quot;input&quot;, () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        setRec(id, { note: textarea.value });
        el.querySelector('[data-role=&quot;updated&quot;]').textContent = fmtDate(getRec(id).updated);
        flashSaved(el);
        updateSidebarCounts();
      }, 500);
    });
    textarea.addEventListener(&quot;click&quot;, e => e.stopPropagation());

    // Delete / remove
    el.querySelector('[data-role=&quot;delete-item&quot;]').addEventListener(&quot;click&quot;, e => {
      e.stopPropagation();
      const item = ITEMS.find(i => i.id === id);
      if (!item) return;
      if (item.custom) {
        if (!confirm(&quot;Delete this custom topic permanently?&quot;)) return;
        state.custom = state.custom.filter(c => c.id !== id);
        delete state[id];
        saveState();
        renderAll();
        toast(&quot;Custom topic deleted&quot;);
      } else {
        if (!confirm(&quot;Remove this topic from your list?&quot;)) return;
        state.hidden[id] = true;
        saveState();
        renderAll();
        toast(&quot;Topic removed — find it under Hidden topics&quot;);
      }
    });
  });
}

function flashSaved(el) {
  const hint = el.querySelector('[data-role=&quot;savehint&quot;]');
  if (!hint) return;
  hint.classList.add(&quot;show&quot;);
  setTimeout(() => hint.classList.remove(&quot;show&quot;), 1000);
}

function updateSidebarCounts() {
  renderSidebar();
  renderHeader();
  renderHeatmap();
  updateQueueBadge();
}

/* ====================== HEADER ====================== */
function renderHeader() {
  const s = overallStats();
  document.getElementById(&quot;sTotal&quot;).textContent = s.total;
  document.getElementById(&quot;sDone&quot;).textContent = s.done;
  document.getElementById(&quot;sLeft&quot;).textContent = s.left;
  document.getElementById(&quot;sDue&quot;).textContent = s.due;
  document.getElementById(&quot;sPct&quot;).textContent = s.pct + &quot;%&quot;;

/* ====================== ANALYTICS ====================== */
function openAnalytics() {
  const grid = document.getElementById(&quot;analyticsGrid&quot;);

  // Subject completion bars
  let subjectHTML = '';
  Object.entries(CATS).forEach(([key, meta]) => {
    const items = ITEMS.filter(i => i.cat === key);
    if (!items.length) return;
    const done = items.filter(i => getRec(i.id).done).length;
    const pct = Math.round((done / items.length) * 100);
    subjectHTML += `<div class=&quot;subj-bar-row&quot;>
      <span class=&quot;subj-bar-name&quot;>${meta.icon} ${meta.label}</span>
      <div class=&quot;subj-bar-track&quot;><div class=&quot;subj-bar-fill&quot; style=&quot;width:${pct}%&quot;></div></div>
      <span class=&quot;subj-bar-pct&quot;>${pct}%</span>
    </div>`;
  });

  // Confidence distribution
  const confDist = [0,0,0,0,0,0];
  ITEMS.forEach(i => { const c = getRec(i.id).conf || 0; confDist[c]++; });
  const confMax = Math.max(...confDist) || 1;
  const confColors = [&quot;#CCC&quot;, &quot;var(--conf1)&quot;,&quot;var(--conf2)&quot;,&quot;var(--conf3)&quot;,&quot;var(--conf4)&quot;,&quot;var(--conf5)&quot;];
  const confNames = [&quot;Unrated&quot;,&quot;1 — Forgot&quot;,&quot;2 — Shaky&quot;,&quot;3 — Okay&quot;,&quot;4 — Confident&quot;,&quot;5 — Mastered&quot;];
  let distHTML = `<div class=&quot;conf-dist-wrap&quot;><div class=&quot;conf-dist&quot;>`;
  confDist.forEach((n, i) => {
    const h = Math.max(4, Math.round((n / confMax) * 62));
    distHTML += `<div class=&quot;conf-dist-bar&quot; style=&quot;height:${h}px;background:${confColors[i]}&quot; data-label=&quot;${confNames[i]}&quot;>
      <div class=&quot;conf-dist-count&quot;>${n}</div>
    </div>`;
  });
  distHTML += `</div></div>`;

  // Due items
  const dueItems = ITEMS.filter(i => isDueForRevision(getRec(i.id)));
  let dueHTML = dueItems.length ? `<div class=&quot;flagged-list&quot;>` : `<div style=&quot;font-size:12px;color:var(--ink-soft)&quot;>No topics due — you're on top of things! 🎉</div>`;
  dueItems.slice(0, 20).forEach(item => {
    const rec = getRec(item.id);
    dueHTML += `<div class=&quot;flagged-item&quot;>
      <span class=&quot;fi-title&quot;>${esc(item.t)}</span>
      <span class=&quot;fi-sub&quot;>Due: ${fmtShortDate(rec.nextRev)}</span>
    </div>`;
  });
  if (dueItems.length) dueHTML += `</div>`;

  // Study stats
  const totalReviews = ITEMS.reduce((n, i) => n + (getRec(i.id).revCount || 0), 0);
  const mostReviewed = [...ITEMS].sort((a,b) => (getRec(b.id).revCount||0)-(getRec(a.id).revCount||0)).slice(0,3);
  let topRevHTML = mostReviewed.map(i => `<div class=&quot;flagged-item&quot;>
    <span class=&quot;fi-title&quot;>${esc(i.t)}</span>
    <span class=&quot;fi-sub&quot;>×${getRec(i.id).revCount||0}</span>
  </div>`).join(&quot;&quot;);

  grid.innerHTML = `
    <div class=&quot;analytics-card full&quot;>
      <h3>Subject completion</h3>
      ${subjectHTML}
    </div>
    <div class=&quot;analytics-card&quot;>
      <h3>Confidence distribution</h3>
      ${distHTML}
    </div>
    <div class=&quot;analytics-card&quot;>
      <h3>Due for revision (${dueItems.length})</h3>
      ${dueHTML}
    </div>
    <div class=&quot;analytics-card&quot;>
      <h3>Most reviewed topics</h3>
      <div class=&quot;flagged-list&quot;>${topRevHTML || '<div style=&quot;font-size:12px;color:var(--ink-soft)&quot;>No reviews yet</div>'}</div>
    </div>
    <div class=&quot;analytics-card&quot;>
      <h3>Study stats</h3>
      <div style=&quot;display:grid;gap:10px;margin-top:4px&quot;>
        <div style=&quot;display:flex;justify-content:space-between;font-size:13px&quot;><span>Total reviews logged</span><b>${totalReviews}</b></div>
        <div style=&quot;display:flex;justify-content:space-between;font-size:13px&quot;><span>Current streak</span><b>${calcStreak()} days 🔥</b></div>
        <div style=&quot;display:flex;justify-content:space-between;font-size:13px&quot;><span>Topics with notes</span><b>${ITEMS.filter(i=>{const r=getRec(i.id);return r.note&amp;&amp;r.note.trim()}).length}</b></div>
        <div style=&quot;display:flex;justify-content:space-between;font-size:13px&quot;><span>Tagged-PYQ topics done</span><b>${ITEMS.filter(i=>(getRec(i.id).pyqFreq||0)>=1&amp;&amp;getRec(i.id).done).length}/${ITEMS.filter(i=>(getRec(i.id).pyqFreq||0)>=1).length}</b></div>
        <div style=&quot;display:flex;justify-content:space-between;font-size:13px&quot;><span>Topics mastered (conf 5)</span><b>${ITEMS.filter(i=>getRec(i.id).conf===5).length}</b></div>
      </div>
    </div>`;

  document.getElementById(&quot;analyticsOverlay&quot;).classList.add(&quot;open&quot;);
}

document.getElementById(&quot;analyticsBtn&quot;).addEventListener(&quot;click&quot;, openAnalytics);
document.getElementById(&quot;analyticsClose&quot;).addEventListener(&quot;click&quot;, () => {
  document.getElementById(&quot;analyticsOverlay&quot;).classList.remove(&quot;open&quot;);
});
document.getElementById(&quot;analyticsOverlay&quot;).addEventListener(&quot;click&quot;, e => {
  if (e.target === document.getElementById(&quot;analyticsOverlay&quot;))
    document.getElementById(&quot;analyticsOverlay&quot;).classList.remove(&quot;open&quot;);
});

/* ====================== TODAY'S REVISION QUEUE ====================== */
function getDueQueueItems() {
  return ITEMS.filter(i => isDueForRevision(getRec(i.id)))
    .sort((a, b) => {
      const ra = getRec(a.id), rb = getRec(b.id);
      // Most overdue first
      if (ra.nextRev !== rb.nextRev) return ra.nextRev < rb.nextRev ? -1 : 1;
      // Then by priority (Must > Important > Extra)
      const order = { h: 0, m: 1, l: 2 };
      return (order[a.p] ?? 1) - (order[b.p] ?? 1);
    });
}

function updateQueueBadge() {
  const count = getDueQueueItems().length;
  const badge = document.getElementById(&quot;queueCountBadge&quot;);
  if (!badge) return;
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = &quot;&quot;;
  } else {
    badge.textContent = &quot;&quot;;
    badge.style.display = &quot;none&quot;;
  }
}

function renderQueueBanner() {
  const items = getDueQueueItems();
  if (!items.length) return &quot;&quot;;
  return `<div class=&quot;queue-banner&quot;>
    <div class=&quot;queue-banner-text&quot;>
      <b>${items.length} topic${items.length === 1 ? &quot;&quot; : &quot;s&quot;}</b> due for revision today.
    </div>
    <button class=&quot;queue-banner-btn&quot; id=&quot;queueBannerBtn&quot;>Open Today's Queue →</button>
  </div>`;
}

function renderTodayQueue() {
  const body = document.getElementById(&quot;queueBody&quot;);
  const items = getDueQueueItems();

  if (!items.length) {
    body.innerHTML = `<div class=&quot;empty&quot;>
      <div class=&quot;ic&quot;>✅</div>
      <h3>All caught up!</h3>
      <p>Nothing is due for revision right now. Come back tomorrow, or open Flashcard Mode to get ahead on pending topics.</p>
    </div>`;
    updateQueueBadge();
    return;
  }

  const overdueCount = items.filter(i => getRec(i.id).nextRev < todayStr()).length;
  const dueTodayCount = items.length - overdueCount;
  body.innerHTML = `<div class=&quot;queue-progress&quot;>${overdueCount ? `${overdueCount} overdue` : &quot;&quot;}${overdueCount &amp;&amp; dueTodayCount ? &quot; · &quot; : &quot;&quot;}${dueTodayCount ? `${dueTodayCount} due today` : &quot;&quot;} — rate your recall to reschedule each one</div>` +
    items.map(item => {
      const rec = getRec(item.id);
      const meta = CATS[item.cat] || { label: item.cat, icon: &quot;•&quot; };
      const isOverdue = rec.nextRev < todayStr();
      const dueLabel = isOverdue
        ? `<span class=&quot;queue-overdue&quot;>overdue since ${fmtShortDate(rec.nextRev)}</span>`
        : `<span class=&quot;queue-due-today&quot;>due today</span>`;
      return `<div class=&quot;queue-item&quot; data-id=&quot;${item.id}&quot;>
        <div class=&quot;queue-item-main&quot;>
          <div class=&quot;queue-item-title&quot;>
            <span>${esc(item.t)}</span>
            ${pyqBadgeHTML(rec.pyqFreq || 0)}
            <span class=&quot;badge ${item.p === &quot;h&quot; ? &quot;h&quot; : item.p === &quot;m&quot; ? &quot;m&quot; : &quot;l&quot;}&quot;>${PRI_LABELS[item.p] || &quot;Extra&quot;}</span>
          </div>
          <div class=&quot;queue-item-meta&quot;>${meta.icon} ${esc(item.sub)} · ${dueLabel}${rec.revCount ? ` · reviewed ×${rec.revCount}` : &quot;&quot;}</div>
        </div>
        <div class=&quot;queue-item-actions&quot;>
          <span class=&quot;queue-rate-label&quot;>Rate recall →</span>
          ${[1,2,3,4,5].map(n => `<button class=&quot;queue-dot&quot; data-val=&quot;${n}&quot; title=&quot;${confLabel(n)}&quot;>${n}</button>`).join(&quot;&quot;)}
        </div>
      </div>`;
    }).join(&quot;&quot;);

  body.querySelectorAll(&quot;.queue-item&quot;).forEach(el => {
    const id = el.dataset.id;
    el.querySelectorAll(&quot;.queue-dot&quot;).forEach(btn => {
      btn.addEventListener(&quot;click&quot;, () => {
        const val = parseInt(btn.dataset.val, 10);
        const rec = getRec(id);
        const revCount = (rec.revCount || 0) + 1;
        setRec(id, { conf: val, nextRev: calcNextRev(val), revCount, done: true });
        recordActivity();
        renderAll();
        renderTodayQueue();
        toast(`Reviewed — next revision in ${SR_INTERVALS[val]} day${SR_INTERVALS[val] > 1 ? &quot;s&quot; : &quot;&quot;}`);
      });
    });
  });

  updateQueueBadge();
}

function openTodayQueue() {
  renderTodayQueue();
  document.getElementById(&quot;queueOverlay&quot;).classList.add(&quot;open&quot;);
}

document.getElementById(&quot;queueBtn&quot;).addEventListener(&quot;click&quot;, openTodayQueue);
document.getElementById(&quot;queueClose&quot;).addEventListener(&quot;click&quot;, () => {
  document.getElementById(&quot;queueOverlay&quot;).classList.remove(&quot;open&quot;);
});
document.getElementById(&quot;queueOverlay&quot;).addEventListener(&quot;click&quot;, e => {
  if (e.target === document.getElementById(&quot;queueOverlay&quot;))
    document.getElementById(&quot;queueOverlay&quot;).classList.remove(&quot;open&quot;);
});

/* ====================== FLASHCARD MODE ====================== */
let fcQueue = [];
let fcIndex = 0;

function buildFlashcardQueue() {
  // Pending or low-confidence items
  return ITEMS.filter(item => {
    const rec = getRec(item.id);
    if (!rec.done) return true; // not done
    if (rec.conf <= 2) return true; // low confidence
    if (isDueForRevision(rec)) return true;
    return false;
  }).sort((a, b) => {
    const ra = getRec(a.id), rb = getRec(b.id);
    const confA = ra.conf || 0, confB = rb.conf || 0;
    return confA - confB; // lowest confidence first
  });
}

function openFlashcards() {
  fcQueue = buildFlashcardQueue();
  fcIndex = 0;
  document.getElementById(&quot;flashcardOverlay&quot;).classList.add(&quot;open&quot;);
  renderFlashcard();
}

function renderFlashcard() {
  const content = document.getElementById(&quot;fcContent&quot;);
  const counter = document.getElementById(&quot;fcCounter&quot;);

  if (!fcQueue.length) {
    counter.textContent = &quot;&quot;;
    content.innerHTML = `<div class=&quot;fc-empty&quot;>
      <h3>🎉 Queue is empty!</h3>
      <p style=&quot;color:#7A8FAE;font-family:'IBM Plex Mono',monospace;font-size:12px;margin-top:8px&quot;>All pending and low-confidence topics covered.</p>
    </div>`;
    return;
  }

  const item = fcQueue[fcIndex];
  const rec = getRec(item.id);
  const pct = Math.round(((fcIndex) / fcQueue.length) * 100);

  counter.textContent = `${fcIndex + 1} / ${fcQueue.length}`;

  const meta = CATS[item.cat] || { label: item.cat, icon: &quot;•&quot; };
  content.innerHTML = `<div class=&quot;fc-card&quot;>
    <div>
      <div class=&quot;fc-cat&quot;>${meta.icon} ${meta.label.toUpperCase()}</div>
      <div class=&quot;fc-subject&quot;>${esc(item.sub)}</div>
    </div>
    <div class=&quot;fc-title&quot;>${esc(item.t)}</div>
    <button class=&quot;fc-reveal&quot; id=&quot;fcRevealBtn&quot;>Reveal hints ▾</button>
    <div class=&quot;fc-hint&quot; id=&quot;fcHint&quot;>${esc(item.s)}${rec.note ? `<div style=&quot;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1);font-size:12px;color:#7A8FAE&quot;>📝 ${esc(rec.note)}</div>` : &quot;&quot;}</div>
    <div class=&quot;fc-progress&quot; style=&quot;width:${pct}%&quot;></div>
  </div>
  <div class=&quot;fc-controls&quot;>
    <button class=&quot;fc-btn skip&quot; id=&quot;fcSkip&quot;>→ Skip</button>
    <button class=&quot;fc-btn nope&quot; id=&quot;fcNope&quot;>✗ Need more revision</button>
    <button class=&quot;fc-btn got-it&quot; id=&quot;fcGotIt&quot;>✓ Got it</button>
  </div>`;

  document.getElementById(&quot;fcRevealBtn&quot;).addEventListener(&quot;click&quot;, () => {
    document.getElementById(&quot;fcHint&quot;).classList.add(&quot;shown&quot;);
    document.getElementById(&quot;fcRevealBtn&quot;).classList.add(&quot;hidden-btn&quot;);
  });
  document.getElementById(&quot;fcSkip&quot;).addEventListener(&quot;click&quot;, () => { fcIndex = (fcIndex + 1) % fcQueue.length; renderFlashcard(); });
  document.getElementById(&quot;fcNope&quot;).addEventListener(&quot;click&quot;, () => {
    const curConf = rec.conf || 0;
    const newConf = Math.max(1, curConf - 1);
    setRec(item.id, { conf: newConf, nextRev: calcNextRev(newConf) });
    recordActivity();
    fcQueue.splice(fcIndex, 1);
    if (fcIndex >= fcQueue.length) fcIndex = 0;
    renderFlashcard();
    toast(&quot;Marked for revision soon&quot;);
  });
  document.getElementById(&quot;fcGotIt&quot;).addEventListener(&quot;click&quot;, () => {
    const curConf = rec.conf || 0;
    const newConf = Math.min(5, curConf + 1);
    const revCount = (rec.revCount || 0) + 1;
    setRec(item.id, { conf: newConf, nextRev: calcNextRev(newConf), revCount, done: newConf >= 3 ? true : rec.done });
    recordActivity();
    fcQueue.splice(fcIndex, 1);
    if (fcIndex >= fcQueue.length) fcIndex = 0;
    renderFlashcard();
    toast(`Confidence → ${newConf}/5 — next review in ${SR_INTERVALS[newConf]} day${SR_INTERVALS[newConf]>1?&quot;s&quot;:&quot;&quot;}`);
  });
}

document.getElementById(&quot;flashcardBtn&quot;).addEventListener(&quot;click&quot;, openFlashcards);
document.getElementById(&quot;fcClose&quot;).addEventListener(&quot;click&quot;, () => {
  document.getElementById(&quot;flashcardOverlay&quot;).classList.remove(&quot;open&quot;);
  renderAll();
});

/* ====================== EXPORT / IMPORT / RESET ====================== */
document.getElementById(&quot;exportBtn&quot;).addEventListener(&quot;click&quot;, () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: &quot;application/json&quot; });
  const url = URL.createObjectURL(blob);
  const a = document.createElement(&quot;a&quot;);
  a.href = url;
  a.download = `upsc-prelims-progress-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(&quot;Progress &amp; notes exported&quot;);
});

document.getElementById(&quot;importBtn&quot;).addEventListener(&quot;click&quot;, () => document.getElementById(&quot;importFile&quot;).click());

document.getElementById(&quot;importFile&quot;).addEventListener(&quot;change&quot;, e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const incoming = JSON.parse(ev.target.result);
      if (typeof incoming !== &quot;object&quot; || incoming === null) throw new Error(&quot;bad shape&quot;);
      state = { ...state, ...incoming };
      saveState();
      renderAll();
      toast(&quot;Backup imported successfully&quot;);
    } catch { toast(&quot;Could not read that file — is it a valid export?&quot;); }
  };
  reader.readAsText(file);
  e.target.value = &quot;&quot;;
});

document.getElementById(&quot;resetBtn&quot;).addEventListener(&quot;click&quot;, () => {
  if (!confirm(&quot;This will clear all progress, ratings and notes on this device. Export a backup first. Continue?&quot;)) return;
  state = {};
  saveState();
  renderAll();
  toast(&quot;All progress reset&quot;);
});

/* ====================== SEARCH ====================== */
let searchDebounce;
document.getElementById(&quot;searchInput&quot;).addEventListener(&quot;input&quot;, e => {
  clearTimeout(searchDebounce);
  const val = e.target.value;
  searchDebounce = setTimeout(() => { filters.q = val.trim(); renderAll(); }, 180);
});

/* ====================== ADD TOPIC ====================== */
const newCatSelect = document.getElementById(&quot;newCat&quot;);
newCatSelect.innerHTML = Object.entries(CATS)
  .map(([key, meta]) => `<option value=&quot;${key}&quot;>${meta.icon} ${meta.label}</option>`).join(&quot;&quot;);

function populateSubList() {
  const cat = newCatSelect.value;
  const subs = [...new Set(allItemsRaw().filter(i => i.cat === cat).map(i => i.sub))];
  document.getElementById(&quot;subList&quot;).innerHTML = subs.map(s => `<option value=&quot;${esc(s)}&quot;></option>`).join(&quot;&quot;);
}
populateSubList();
newCatSelect.addEventListener(&quot;change&quot;, populateSubList);

document.getElementById(&quot;addTopicBtn&quot;).addEventListener(&quot;click&quot;, () => {
  const form = document.getElementById(&quot;addForm&quot;);
  form.classList.toggle(&quot;open&quot;);
  if (form.classList.contains(&quot;open&quot;)) { populateSubList(); document.getElementById(&quot;newTitle&quot;).focus(); }
});
document.getElementById(&quot;addCancel&quot;).addEventListener(&quot;click&quot;, () => {
  document.getElementById(&quot;addForm&quot;).classList.remove(&quot;open&quot;);
  [&quot;newSub&quot;,&quot;newTitle&quot;,&quot;newDesc&quot;].forEach(id => document.getElementById(id).value = &quot;&quot;);
  document.getElementById(&quot;newPri&quot;).value = &quot;m&quot;;
});
document.getElementById(&quot;addSubmit&quot;).addEventListener(&quot;click&quot;, () => {
  const title = document.getElementById(&quot;newTitle&quot;).value.trim();
  if (!title) { toast(&quot;Give the topic a title first&quot;); document.getElementById(&quot;newTitle&quot;).focus(); return; }
  const cat = newCatSelect.value;
  const sub = document.getElementById(&quot;newSub&quot;).value.trim() || &quot;Custom topics&quot;;
  const desc = document.getElementById(&quot;newDesc&quot;).value.trim();
  const pri = document.getElementById(&quot;newPri&quot;).value;
  const id = &quot;custom&quot; + Date.now() + Math.floor(Math.random() * 1000);
  state.custom.push({ id, cat, sub, t: title, s: desc, p: pri, custom: true });
  saveState();
  [&quot;newSub&quot;,&quot;newTitle&quot;,&quot;newDesc&quot;].forEach(i => document.getElementById(i).value = &quot;&quot;);
  document.getElementById(&quot;newPri&quot;).value = &quot;m&quot;;
  document.getElementById(&quot;addForm&quot;).classList.remove(&quot;open&quot;);
  filters.cat = cat; filters.special = null;
  renderAll();
  toast(&quot;Topic added&quot;);
});

/* ====================== INIT ====================== */
function renderAll() {
  refreshItems();
  renderHeader();
  renderSidebar();
  renderMain();
  renderHeatmap();
  updateQueueBadge();
}
renderAll();
</script>

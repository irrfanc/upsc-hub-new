/* ── REVISION ITEM ── */
.rev-item{display:flex;align-items:flex-start;gap:.75rem;padding:.8rem;border-radius:var(--radius2);border:1px solid var(--border);margin-bottom:.5rem;background:var(--bg2);transition:.15s}

.rev-check.done{background:var(--green);border-color:var(--green);color:#000}
.rev-check.due{border-color:var(--red)}
.rev-content{flex:1}
.rev-topic{font-size:13px;color:var(--text);font-weight:500}
.rev-sub{font-size:11px;color:var(--text3);margin-top:3px}
.rev-date{font-size:11px;font-weight:600}
.rev-date.overdue{color:var(--red)}
.rev-date.today{color:var(--gold)}
.rev-date.upcoming{color:var(--text3)}
.rev-date.done{color:var(--green)}

/* ── RESOURCE ── */
.resource-item{display:flex;align-items:center;gap:.75rem;padding:.8rem;border-radius:var(--radius2);border:1px solid var(--border);margin-bottom:.5rem;background:var(--bg2);transition:.15s}
.resource-item:hover{border-color:var(--border2);background:var(--bg3)}
.res-icon{width:36px;height:36px;border-radius:var(--radius2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.res-body{flex:1;min-width:0}
.res-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res-sub{font-size:11px;color:var(--text3);margin-top:2px}
.res-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;margin-left:auto;flex-shrink:0;letter-spacing:.04em}

/* ── MOCK TEST ── */
.mock-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:1rem;margin-bottom:.7rem;transition:.15s}
.mock-card:hover{border-color:var(--border2);background:var(--bg3)}
.mock-score-big{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px}
.mock-meta{font-size:11px;color:var(--text3)}
.qualify-tag{font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;letter-spacing:.03em}
.qualify-yes{background:var(--green-bg);color:var(--green)}
.qualify-no{background:var(--red-bg);color:var(--red)}

/* ── TREND CHART ── */
.trend-chart{position:relative;border-bottom:1px solid var(--border);padding-top:14px}
.trend-bars{display:flex;gap:5px;height:100%;align-items:flex-end}
.trend-bar{flex:1;min-width:9px;border-radius:3px 3px 0 0;transition:.3s}
.trend-labels{display:flex;gap:5px;margin-top:5px}
.trend-labels span{flex:1;min-width:9px;text-align:center;font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden}
.trend-cutoff-line{position:absolute;left:0;right:0;border-top:1.5px dashed var(--red);z-index:2}
.trend-cutoff-label{position:absolute;right:2px;top:-9px;font-size:9px;color:var(--red);background:var(--bg2);padding:0 4px}

/* ── CUTOFF STRIP ── */
.cutoff-strip{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:4px}
.cutoff-chip{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:.5rem .8rem;text-align:center;min-width:60px}
.cutoff-chip.current{border-color:var(--accent);background:var(--accent-bg)}
.cutoff-chip .cy{font-size:10px;color:var(--text3)}
.cutoff-chip .cs{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--text)}

/* ── READINESS RING ── */
.readiness-ring-svg circle.track{stroke:var(--bg4)}
.readiness-ring-svg circle.fill{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1s ease}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s ease}

.modal-head{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}

.modal-body{padding:1.25rem 1.5rem}
.modal-foot{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.5rem}

.ml-auto{margin-left:auto}

.mt-05{margin-top:.5rem}
.gap-1{gap:1rem}
.fw-500{font-weight:500}
.fw-600{font-weight:600}
.div{border-top:1px solid var(--border);margin:1rem 0}
.alert{padding:.75rem 1rem;border-radius:var(--radius2);font-size:13px;margin-bottom:.75rem;display:flex;align-items:flex-start;gap:.6rem;line-height:1.5}
.alert-warn{background:rgba(240,187,60,.07);border:1px solid rgba(240,187,60,.2);color:var(--gold)}

/* ── ANALYTICS ── */

#pomodoro{

}

}

}

#pom-progress-ring{display:none;position:absolute;top:calc(50% - 110px);left:calc(50% - 110px)}
#pom-progress-ring circle.track{stroke:var(--bg4)}
#pom-progress-ring circle.progress{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .9s linear}

.cd-block{text-align:center}

.tip{position:relative}
.tip::after{content:attr(data-tip);position:absolute;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);background:#0a0d14;color:var(--text2);font-size:11px;padding:4px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:.15s;border:1px solid var(--border);z-index:999}

.topic-chip{

function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}
function fmtDateShort(d){return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})}
function diffDays(d1,d2){const a=new Date(d1+'T00:00:00'),b=new Date(d2+'T00:00:00');return Math.round((b-a)/(86400000))}
function addDays(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}
function weekStart(){const d=new Date();d.setDate(d.getDate()-d.getDay());return d.toISOString().slice(0,10)}
function hexToRgba(hex,a){
  const h=hex.replace('#','');
  const r=parseInt(h.substring(0,2),16),g=parseInt(h.substring(2,4),16),b=parseInt(h.substring(4,6),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

let pomTimer=null,pomRunning=false,pomTotalSeconds=25*60,pomSeconds=25*60;
const CIRCUMFERENCE=2*Math.PI*96;

function startPomAndExpand(){
  if(!pomRunning){togglePom();}
  expandTimer();
}
function expandTimer(){
  const el=document.getElementById('pomodoro');
  el.classList.add('fullscreen');
  document.getElementById('app-nav').classList.add('hidden-by-timer');
  document.body.style.overflow='hidden';
  updateRing();
}
function collapseTimer(){
  const el=document.getElementById('pomodoro');
  el.classList.remove('fullscreen');
  document.getElementById('app-nav').classList.remove('hidden-by-timer');
  document.body.style.overflow='';
}
function togglePom(){
  pomRunning=!pomRunning;
  const el=document.getElementById('pomodoro');
  const btn=document.getElementById('pom-btn');
  if(pomRunning){
    btn.textContent='⏸ Pause';
    el.classList.add('running');
    pomTimer=setInterval(tick,1000);
  } else {
    btn.textContent='▶ Resume';
    el.classList.remove('running');
    clearInterval(pomTimer);
  }
}
function tick(){
  pomSeconds--;
  updatePomDisplay();
  updateRing();
  if(pomSeconds<=0){
    clearInterval(pomTimer);
    pomRunning=false;
    document.getElementById('pom-btn').textContent='▶ Start';
    document.getElementById('pom-label').textContent='Done! ✓';
    document.getElementById('pomodoro').classList.remove('running');
    document.getElementById('pomodoro').classList.add('done-flash');
    setTimeout(()=>document.getElementById('pomodoro').classList.remove('done-flash'),3500);
    try{
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      [0,300,600].forEach(delay=>{
        const osc=ctx.createOscillator();const gain=ctx.createGain();
        osc.connect(gain);gain.connect(ctx.destination);
        osc.frequency.value=880;gain.gain.setValueAtTime(.3,ctx.currentTime+delay/1000);
        gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+delay/1000+.4);
        osc.start(ctx.currentTime+delay/1000);osc.stop(ctx.currentTime+delay/1000+.4);
      });
    }catch(e){}
  }
}
function resetPom(){
  clearInterval(pomTimer);pomRunning=false;
  const mins=parseInt(document.getElementById('pom-mode').value)||25;
  pomTotalSeconds=mins*60;pomSeconds=mins*60;
  document.getElementById('pom-btn').textContent='▶ Start';
  document.getElementById('pom-label').textContent='Focus';
  document.getElementById('pomodoro').classList.remove('running','break-mode');
  updatePomDisplay();updateRing();
}
function updatePomDisplay(){
  const m=Math.floor(pomSeconds/60),s=pomSeconds%60;
  const str=m+':'+s.toString().padStart(2,'0');
  document.getElementById('pom-display').textContent=str;
  document.title=pomRunning?(str+' - Studying'):'UPSC Prelims';
}
function updateRing(){
  const ring=document.getElementById('pom-ring-progress');
  const pct=pomSeconds/pomTotalSeconds;
  ring.style.strokeDashoffset=CIRCUMFERENCE*(1-pct);
}

function calcMockScore(paper,total,correct,wrong){
  const m=MARKING[paper];
  const score=Math.round((correct*m.marksPerQ - wrong*m.negPerQ)*100)/100;
  const attempted=correct+wrong;
  const unattempted=Math.max(0,total-attempted);
  const accuracy=attempted>0?Math.round((correct/attempted)*1000)/10:0;
  const attemptRate=total>0?Math.round((attempted/total)*1000)/10:0;
  return {score:score,attempted:attempted,unattempted:unattempted,accuracy:accuracy,attemptRate:attemptRate,maxMarks:m.maxMarks};
}
function liveCalcMock(){
  const paper=document.getElementById('mock-paper').value;

  const correct=parseInt(document.getElementById('mock-correct').value)||0;

  const r=calcMockScore(paper,total,correct,wrong);
  document.getElementById('mock-live-calc').innerHTML='Score: <b>'+r.score+'</b>/'+r.maxMarks+' · Accuracy: <b>'+r.accuracy+'%</b> · Unattempted: <b>'+r.unattempted+'</b>';

function markRev(id){
  const revs=DB.revs();
  const r=revs.find(x=>x.id===id);
  if(!r)return;
  r._undo={revCount:r.revCount||0,nextRev:r.nextRev,lastRev:r.lastRev||null,done:r.done||false};
  r.revCount=(r.revCount||0)+1;
  const nextDays=SPACED_REP_DAYS[Math.min(r.revCount,SPACED_REP_DAYS.length-1)];
  r.nextRev=addDays(today(),nextDays);
  r.lastRev=today();
  r.done=r.revCount>=SPACED_REP_DAYS.length;
  DB.set('revs',revs);
  renderRevisions();renderDashboard();
}
function undoMarkRev(id){
  const revs=DB.revs();
  const r=revs.find(x=>x.id===id);
  if(!r||!r._undo)return;
  r.revCount=r._undo.revCount;
  r.nextRev=r._undo.nextRev;
  r.lastRev=r._undo.lastRev;
  r.done=r._undo.done;
  delete r._undo;
  DB.set('revs',revs);
  renderRevisions();renderDashboard();
}
function editRevCount(id){
  const revs=DB.revs();
  const r=revs.find(x=>x.id===id);
  if(!r)return;
  const cur=r.revCount||0;
  const val=prompt('Edit revision count for &quot;'+r.topic+'&quot;.\nCurrent: '+cur+'\nEnter new count (0-'+SPACED_REP_DAYS.length+'):',cur);
  if(val===null)return;
  const n=parseInt(val);
  if(isNaN(n)||n<0||n>SPACED_REP_DAYS.length){alert('Invalid count. Enter a number between 0 and '+SPACED_REP_DAYS.length);return;}
  r.revCount=n;
  r.done=n>=SPACED_REP_DAYS.length;
  const nextDays=SPACED_REP_DAYS[Math.min(Math.max(n,0),SPACED_REP_DAYS.length-1)];
  r.nextRev=addDays(today(),nextDays);
  delete r._undo;
  DB.set('revs',revs);
  renderRevisions();renderDashboard();
}
function deleteRev(id){
  if(!confirm('Delete this revision topic?'))return;
  DB.set('revs',DB.revs().filter(x=>x.id!==id));
  renderRevisions();
}

// ─── READINESS METER ───
const READY_CIRC=2*Math.PI*52;
function updateReadinessRing(pct){
  const ring=document.getElementById('readiness-ring-fill');
  ring.style.strokeDashoffset=READY_CIRC*(1-pct/100);
}
function computeReadiness(){
  const logs=DB.logs(),revs=DB.revs(),mocks=DB.mocks(),caItems=DB.ca();
  const td=today();
  const target=DB.get('daily_target')||8;
  const last7=logs.filter(l=>{const dd=diffDays(l.date,td);return dd>=0&amp;&amp;dd<=6}).reduce((s,l)=>s+l.hours,0);
  const consistency=Math.min(100,Math.round((last7/(target*7))*100));
  const active=revs.filter(r=>!r.done);
  const overdue=active.filter(r=>r.nextRev<td).length;
  const revHealth=active.length===0?100:Math.round((1-overdue/active.length)*100);
  const gs1Mocks=mocks.filter(m=>m.paper==='GS1').slice(-5);
  const mockPerf=gs1Mocks.length===0?0:Math.min(100,Math.round((gs1Mocks.reduce((s,m)=>s+m.score,0)/gs1Mocks.length/AVG_CUTOFF)*100));
  const caLast7=caItems.filter(c=>{const dd=diffDays(c.date,td);return dd>=0&amp;&amp;dd<=6}).length;
  const caConsistency=Math.min(100,Math.round((caLast7/5)*100));
  const pct=Math.round((consistency+revHealth+mockPerf+caConsistency)/4);
  let label;
  if(pct<30)label='Early Days - Build the Base';
  else if(pct<55)label='Gaining Momentum';
  else if(pct<75)label='Exam-Ready Zone';
  else label='Peak Form - Sharpen &amp; Repeat';
  return {pct:pct,label:label,consistency:consistency,revHealth:revHealth,mockPerf:mockPerf,caConsistency:caConsistency,hasMocks:gs1Mocks.length>0};
}

// ─── TREND CHART ───
function buildTrendChart(containerId, mocksList, height){
  height=height||110;
  const el=document.getElementById(containerId);
  if(!el)return;
  if(!mocksList||mocksList.length===0){el.innerHTML='<div class=&quot;empty&quot;>No mock tests logged yet. Log your first one to start the trend.</div>';return}
  const maxMarks=200;
  const cutoffPx=Math.round((AVG_CUTOFF/maxMarks)*height);
  let bars='',labels='';
  mocksList.forEach(m=>{
    const px=Math.max(3,Math.round((Math.max(m.score,0)/maxMarks)*height));
    const color=m.paper==='GS1'?'var(--accent)':'var(--red)';
    const safeName=(m.name||'').replace(/&quot;/g,'&amp;quot;');
    bars+='<div class=&quot;trend-bar tip&quot; data-tip=&quot;'+safeName+' \u00b7 '+m.score+'/'+maxMarks+'&quot; style=&quot;height:'+px+'px;background:'+color+'&quot;></div>';
    labels+='<span>'+fmtDateShort(m.date)+'</span>';
  });
  el.innerHTML='<div class=&quot;trend-chart&quot; style=&quot;height:'+height+'px&quot;>'+
      '<div class=&quot;trend-cutoff-line&quot; style=&quot;bottom:'+cutoffPx+'px&quot;><span class=&quot;trend-cutoff-label&quot;>~cutoff</span></div>'+
      '<div class=&quot;trend-bars&quot;>'+bars+'</div>'+
    '</div>'+
    '<div class=&quot;trend-labels&quot;>'+labels+'</div>';
}

function renderHeatmap(){
  const logs=DB.logs();
  const dateCount={};
  logs.forEach(l=>dateCount[l.date]=(dateCount[l.date]||0)+1);
  const hm=document.getElementById('heatmap');
  const weeks=15;const cells=weeks*7;
  const start=new Date();start.setDate(start.getDate()-(cells-1));
  let html='<div class=&quot;heatmap-grid&quot;>';
  for(let i=0;i<cells;i++){
    const d=new Date(start);d.setDate(d.getDate()+i);
    const key=d.toISOString().slice(0,10);
    const cnt=dateCount[key]||0;
    const lvl=cnt===0?0:cnt===1?1:cnt<=2?2:cnt<=4?3:4;
    const label=key+': '+cnt+' session'+(cnt!==1?'s':'');
    html+='<div class=&quot;hm-cell hm-'+lvl+'&quot; title=&quot;'+label+'&quot;></div>';
  }
  html+='</div>';
  hm.innerHTML=html;
}

function setCaCatFilter(c){caCatFilter=c;renderCa();}
function renderCa(){
  const pills=document.getElementById('ca-cat-pills');
  const cats=['all',...CA_CATEGORIES];
  pills.innerHTML=cats.map((c,i)=>{
    const color=c==='all'?'background:var(--bg3);color:var(--text2)':('background:'+hexToRgba(CA_COLORS[(i-1)%CA_COLORS.length],.12)+';color:'+CA_COLORS[(i-1)%CA_COLORS.length]);
    return '<button class=&quot;subj-pill '+(caCatFilter===c?'sel':'')+'&quot; style=&quot;'+color+'&quot; onclick=&quot;setCaCatFilter(\''+c+'\')&quot;>'+(c==='all'?'All':c)+'</button>';
  }).join('');

  let items=DB.ca();
  if(caCatFilter!=='all')items=items.filter(c=>c.category===caCatFilter);
  const df=document.getElementById('ca-date-filter').value;
  const rf=document.getElementById('ca-rel-filter').value;
  const td=today(),ws=weekStart(),ms=td.slice(0,8)+'01';
  if(df==='today')items=items.filter(c=>c.date===td);
  else if(df==='week')items=items.filter(c=>c.date>=ws);
  else if(df==='month')items=items.filter(c=>c.date>=ms);
  if(rf!=='all')items=items.filter(c=>c.relevance===rf);
  const q=document.getElementById('ca-search').value.toLowerCase();
  if(q)items=items.filter(c=>c.headline.toLowerCase().includes(q)||(c.notes||'').toLowerCase().includes(q)||(c.source||'').toLowerCase().includes(q));
  items.sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('ca-count').textContent=items.length+' entr'+(items.length!==1?'ies':'y');

  const all=DB.ca();
  document.getElementById('ca-stat-total').textContent=all.length;
  document.getElementById('ca-stat-week').textContent=all.filter(c=>c.date>=ws).length;
  document.getElementById('ca-stat-high').textContent=all.filter(c=>c.relevance==='High').length;
  const caRevDue=DB.revs().filter(r=>!r.done&amp;&amp;r.subject==='Current Affairs'&amp;&amp;r.nextRev<=td).length;
  document.getElementById('ca-stat-revdue').textContent=caRevDue;

  const el=document.getElementById('ca-list');
  if(items.length===0){el.innerHTML='<div class=&quot;empty&quot;>No entries found. Start logging today&amp;#39;s news!</div>';return}
  const relColor={'High':'badge-red','Medium':'badge-gold','Low':'badge-accent'};
  const groups={};items.forEach(c=>{(groups[c.date]=groups[c.date]||[]).push(c)});
  el.innerHTML=Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const gl=groups[date];
    return '<div style=&quot;margin-bottom:1.4rem&quot;>'+
      '<div class=&quot;text-sm fw-600 mb-05&quot;>'+fmtDate(date)+'</div>'+
      gl.map(c=>{
        const idx=CA_CATEGORIES.indexOf(c.category);
        const color=idx>-1?CA_COLORS[idx%CA_COLORS.length]:'var(--text3)';
        return '<div class=&quot;log-entry&quot; style=&quot;border-left-color:'+color+'&quot;>'+
          '<div class=&quot;row mb-05&quot; style=&quot;gap:6px;flex-wrap:wrap&quot;>'+
            '<span class=&quot;badge&quot; style=&quot;background:'+hexToRgba(color,.12)+';color:'+color+'&quot;>'+c.category+'</span>'+
            '<span class=&quot;badge '+(relColor[c.relevance]||'badge-accent')+'&quot;>'+c.relevance+'</span>'+
            '<div class=&quot;ml-auto row&quot; style=&quot;gap:4px&quot;>'+
              '<button class=&quot;btn-icon&quot; onclick=&quot;deleteCa(\''+c.id+'\')&quot; title=&quot;Delete&quot; style=&quot;color:var(--text3)&quot;>✕</button>'+
            '</div>'+
          '</div>'+
          '<div class=&quot;log-topic&quot;>'+c.headline+'</div>'+
          (c.notes?('<div class=&quot;log-note&quot;>'+c.notes+'</div>'):'')+
          (c.source?('<div class=&quot;text-xs text-dim mt-05&quot;>Source: '+c.source+'</div>'):'')+
        '</div>';
      }).join('')+
    '</div>';
  }).join('');
}

// ─── SUBJECT PILLS BUILDER ───
function buildSubjPills(containerId, currentVal, onSelect, includeGeneral){
  const el=document.getElementById(containerId);
  if(!el)return;
  window['_pillCb_'+containerId]=onSelect;
  let opts=['all',...SUBJECTS];
  if(includeGeneral)opts.push('General');
  el.innerHTML=opts.map(s=>{
    const cls=s==='all'?'':(SUBJ_COLOR[s]||'');
    const style=s==='all'?'background:var(--bg3);color:var(--text2)':(s==='General'?'background:var(--bg4);color:var(--text2)':'');
    return '<button class=&quot;subj-pill '+cls+' '+(currentVal===s?'sel':'')+'&quot; style=&quot;'+style+'&quot; onclick=&quot;window[\'_pillCb_'+containerId+'\'](\''+s+'\')&quot;>'+(s==='all'?'All Subjects':s)+'</button>';
  }).join('');
}

// ─── RENDER REVISIONS ───
function setRevTab(t){
  revTab=t;
  document.querySelectorAll('[id^=&quot;revtab-&quot;]').forEach(b=>{b.style.background='';b.style.borderColor='var(--border)'});
  const btn=document.getElementById('revtab-'+t);
  if(btn){btn.style.background='var(--bg3)';btn.style.borderColor='var(--border2)'}
  renderRevisions();
}
function renderRevisions(){
  let revs=DB.revs();
  const td=today(),ws=weekStart();const weekEnd=addDays(ws,6);
  if(revTab==='all')revs=revs.filter(r=>!r.done);
  else if(revTab==='overdue')revs=revs.filter(r=>!r.done&amp;&amp;r.nextRev<td);
  else if(revTab==='today')revs=revs.filter(r=>!r.done&amp;&amp;r.nextRev===td);
  else if(revTab==='week')revs=revs.filter(r=>!r.done&amp;&amp;r.nextRev>=td&amp;&amp;r.nextRev<=weekEnd);
  else if(revTab==='done')revs=revs.filter(r=>r.done);
  revs.sort((a,b)=>a.nextRev.localeCompare(b.nextRev));
  const el=document.getElementById('rev-list');
  if(revs.length===0){el.innerHTML='<div class=&quot;empty&quot;>'+(revTab==='done'?'No mastered topics yet. Keep revising!':'Nothing here. 🎉')+'</div>';return}
  el.innerHTML=revs.map(r=>{
    const isOverdue=!r.done&amp;&amp;r.nextRev<td;
    const isToday=!r.done&amp;&amp;r.nextRev===td;
    const dateClass=r.done?'done':isOverdue?'overdue':isToday?'today':'upcoming';
    const dateLabel=r.done?'Mastered ✓':isOverdue?(diffDays(r.nextRev,td)+'d overdue'):isToday?'Today':fmtDateShort(r.nextRev);
    return '<div class=&quot;rev-item&quot;>'+
      (r.done?'<div class=&quot;rev-check done&quot;>✓</div>':'<div class=&quot;rev-check '+(isOverdue?'due':'')+'&quot; onclick=&quot;markRev(\''+r.id+'\')&quot;>✓</div>')+
      '<div class=&quot;rev-content&quot;>'+
        '<div class=&quot;rev-topic&quot;>'+r.topic+(r.priority==='high'?' 🔴':r.priority==='low'?' 🟢':'')+'</div>'+
        '<div class=&quot;rev-sub&quot;><span class=&quot;badge '+SUBJ_COLOR[r.subject]+'&quot;>'+r.subject+'</span> · Rev #'+(r.revCount||0)+'/'+SPACED_REP_DAYS.length+(r.notes?(' · '+r.notes.slice(0,60)):'')+'</div>'+
      '</div>'+
      '<div style=&quot;display:flex;flex-direction:column;align-items:flex-end;gap:4px&quot;>'+
        '<div class=&quot;rev-date '+dateClass+'&quot;>'+dateLabel+'</div>'+
        '<div class=&quot;row&quot; style=&quot;gap:4px&quot;>'+
          (r._undo!==undefined?('<button class=&quot;btn btn-xs btn-ghost&quot; onclick=&quot;undoMarkRev(\''+r.id+'\')&quot; style=&quot;color:var(--gold);border-color:var(--gold-glow);font-size:10px&quot;>↩ Undo</button>'):'')+
          '<button class=&quot;btn-icon&quot; onclick=&quot;editRevCount(\''+r.id+'\')&quot; title=&quot;Edit count&quot; style=&quot;width:22px;height:22px;font-size:11px&quot;>✎</button>'+
          '<button class=&quot;btn-icon&quot; onclick=&quot;deleteRev(\''+r.id+'\')&quot; title=&quot;Delete&quot; style=&quot;width:22px;height:22px;font-size:11px;color:var(--text3)&quot;>✕</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ─── RENDER FACTS VAULT ───
function setFactType(t){factTypeFilter=t;renderFacts();}
function renderFacts(){
  const types=['all','Static Fact','Mnemonic','Number to Remember','Comparison','Map Point'];
  document.getElementById('fact-type-pills').innerHTML=types.map(t=>
    '<button class=&quot;btn btn-ghost btn-sm&quot; style=&quot;'+(factTypeFilter===t?'background:var(--accent-bg);color:var(--accent2);border-color:var(--accent)':'')+'&quot; onclick=&quot;setFactType(\''+t+'\')&quot;>'+(t==='all'?'All Types':t)+'</button>'
  ).join('');
  buildSubjPills('fact-subj-pills',factSubjFilter,v=>{factSubjFilter=v;renderFacts()},true);

  let facts=DB.facts();
  if(factTypeFilter!=='all')facts=facts.filter(f=>f.type===factTypeFilter);
  if(factSubjFilter!=='all')facts=facts.filter(f=>f.subject===factSubjFilter);
  const q=document.getElementById('fact-search').value.toLowerCase();
  if(q)facts=facts.filter(f=>f.content.toLowerCase().includes(q)||(f.tags||[]).some(t=>t.toLowerCase().includes(q))||f.subject.toLowerCase().includes(q));
  facts.sort((a,b)=>(b.addedOn||'').localeCompare(a.addedOn||''));
  document.getElementById('fact-count').textContent=facts.length+' entr'+(facts.length!==1?'ies':'y')+' in your vault';

  const el=document.getElementById('fact-list');
  if(facts.length===0){el.innerHTML='<div class=&quot;empty&quot;>No entries yet. Add your first fact or mnemonic!</div>';return}
  const typeIcon={'Static Fact':'📌','Mnemonic':'🧠','Number to Remember':'🔢','Comparison':'⚖️','Map Point':'🗺️'};
  el.innerHTML=facts.map(f=>'<div class=&quot;quote-card&quot;>'+
    '<div class=&quot;row mb-05&quot; style=&quot;gap:6px;flex-wrap:wrap&quot;>'+
      '<span class=&quot;badge '+(SUBJ_COLOR[f.subject]||'badge-accent')+'&quot;>'+f.subject+'</span>'+
      '<span class=&quot;badge badge-gold&quot;>'+(typeIcon[f.type]||'')+' '+f.type+'</span>'+
      '<div class=&quot;ml-auto&quot;><button class=&quot;btn-icon&quot; onclick=&quot;deleteFact(\''+f.id+'\')&quot; title=&quot;Delete&quot; style=&quot;color:var(--text3)&quot;>✕</button></div>'+
    '</div>'+
    '<div class=&quot;quote-text&quot;>'+f.content+'</div>'+
    (f.source?('<div class=&quot;text-xs text-dim&quot;>📖 '+f.source+'</div>'):'')+
    ((f.tags&amp;&amp;f.tags.length)?('<div class=&quot;quote-tags&quot;>'+f.tags.map(t=>'<span class=&quot;badge badge-blue&quot;>#'+t+'</span>').join('')+'</div>'):'')+
  '</div>').join('');
}

// ─── RENDER ANALYTICS ───
function renderAnalytics(){
  const logs=DB.logs(),mocks=DB.mocks(),caItems=DB.ca(),ress=DB.ress(),revs=DB.revs();

  // 1. Sessions per subject
  const subjCount={};SUBJECTS.forEach(s=>subjCount[s]={hrs:0,cnt:0});
  logs.forEach(l=>{if(subjCount[l.subject]){subjCount[l.subject].hrs+=l.hours;subjCount[l.subject].cnt++;}});
  const maxSubjH=Math.max(...Object.values(subjCount).map(x=>x.hrs),1);
  document.getElementById('analytics-subj').innerHTML=logs.length===0?'<div class=&quot;empty&quot;>No sessions logged yet</div>':SUBJECTS.map(s=>
    '<div class=&quot;subject-row&quot;><div class=&quot;subject-row-name&quot;>'+s+'</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:'+Math.round((subjCount[s].hrs/maxSubjH)*100)+'%;background:'+SUBJ_HEX[s]+'&quot;></div></div><div class=&quot;subject-row-count&quot;>'+subjCount[s].cnt+'</div></div>'
  ).join('');

  // 2. Mock trend GS1 vs CSAT
  const sortedMocks=[...mocks].sort((a,b)=>a.date.localeCompare(b.date)).slice(-15);
  buildTrendChart('analytics-mocktrend',sortedMocks,110);

  // 3. Hours by day of week
  const dow=[0,0,0,0,0,0,0];
  const dowNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  logs.forEach(l=>{const d=new Date(l.date+'T00:00:00');dow[d.getDay()]+=l.hours;});
  const maxDow=Math.max(...dow,1);
  document.getElementById('analytics-dow').innerHTML=logs.length===0?'<div class=&quot;empty&quot;>No data yet</div>':dowNames.map((n,i)=>
    '<div class=&quot;subject-row&quot;><div class=&quot;subject-row-name&quot; style=&quot;width:50px&quot;>'+n+'</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:'+Math.round((dow[i]/maxDow)*100)+'%;background:var(--teal)&quot;></div></div><div class=&quot;subject-row-count&quot;>'+(Math.round(dow[i]*10)/10)+'h</div></div>'
  ).join('');

  // 4. Weak-zone finder (mock accuracy by tagged subject)
  const subjMockAcc={};
  mocks.filter(m=>m.subject).forEach(m=>{
    if(!subjMockAcc[m.subject])subjMockAcc[m.subject]={sumAcc:0,cnt:0};
    subjMockAcc[m.subject].sumAcc+=m.accuracy;subjMockAcc[m.subject].cnt++;
  });
  const weakEntries=Object.keys(subjMockAcc).map(s=>({subj:s,avg:subjMockAcc[s].sumAcc/subjMockAcc[s].cnt,cnt:subjMockAcc[s].cnt})).sort((a,b)=>a.avg-b.avg);
  document.getElementById('analytics-weak').innerHTML=weakEntries.length===0?'<div class=&quot;empty&quot;>Log subject-focused mocks to see your weak zones</div>':weakEntries.map(w=>
    '<div class=&quot;subject-row&quot;><div class=&quot;subject-row-name&quot;>'+w.subj+'</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:'+Math.round(w.avg)+'%;background:'+(w.avg<50?'var(--red)':w.avg<70?'var(--gold)':'var(--green)')+'&quot;></div></div><div class=&quot;subject-row-count&quot;>'+Math.round(w.avg)+'%</div></div>'
  ).join('');

  // 5. Topic coverage (unique topics per subject)
  const topicSet={};SUBJECTS.forEach(s=>topicSet[s]=new Set());
  logs.forEach(l=>{if(topicSet[l.subject])topicSet[l.subject].add(l.topic.toLowerCase());});
  const maxTopics=Math.max(...SUBJECTS.map(s=>topicSet[s].size),1);
  document.getElementById('analytics-topics').innerHTML=SUBJECTS.map(s=>
    '<div class=&quot;subject-row&quot;><div class=&quot;subject-row-name&quot;>'+s+'</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:'+Math.round((topicSet[s].size/maxTopics)*100)+'%;background:'+SUBJ_HEX[s]+'&quot;></div></div><div class=&quot;subject-row-count&quot;>'+topicSet[s].size+'</div></div>'
  ).join('');

  // 6. Current affairs by category
  const catCount={};CA_CATEGORIES.forEach(c=>catCount[c]=0);
  caItems.forEach(c=>{if(catCount[c.category]!==undefined)catCount[c.category]++;});
  const maxCat=Math.max(...Object.values(catCount),1);
  document.getElementById('analytics-ca').innerHTML=caItems.length===0?'<div class=&quot;empty&quot;>No current affairs entries yet</div>':CA_CATEGORIES.map((c,i)=>
    '<div class=&quot;subject-row&quot;><div class=&quot;subject-row-name&quot; style=&quot;width:150px&quot;>'+c+'</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:'+Math.round((catCount[c]/maxCat)*100)+'%;background:'+CA_COLORS[i%CA_COLORS.length]+'&quot;></div></div><div class=&quot;subject-row-count&quot;>'+catCount[c]+'</div></div>'
  ).join('');

  // 7. Resource completion
  document.getElementById('analytics-res').innerHTML=ress.length===0?'<div class=&quot;empty&quot;>No resources tracked yet</div>':ress.map(r=>
    '<div class=&quot;subject-row&quot;><div class=&quot;subject-row-name&quot; style=&quot;width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis&quot;>'+r.title+'</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:'+(r.pct||0)+'%;background:'+(r.status==='Completed'?'var(--green)':'var(--accent)')+'&quot;></div></div><div class=&quot;subject-row-count&quot;>'+(r.pct||0)+'%</div></div>'
  ).join('');

  // 8. Confidence breakdown
  const confCount={low:0,medium:0,high:0};
  logs.forEach(l=>{const c=l.conf||'medium';if(confCount[c]!==undefined)confCount[c]++;});
  const totalConf=logs.length||1;
  document.getElementById('analytics-conf').innerHTML=logs.length===0?'<div class=&quot;empty&quot;>No sessions logged yet</div>':
    '<div class=&quot;subject-row&quot;><div class=&quot;subject-row-name&quot;>🟢 High</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:'+Math.round((confCount.high/totalConf)*100)+'%;background:var(--green)&quot;></div></div><div class=&quot;subject-row-count&quot;>'+confCount.high+'</div></div>'+
    '<div class=&quot;subject-row&quot;><div class=&quot;subject-row-name&quot;>🟡 Medium</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:'+Math.round((confCount.medium/totalConf)*100)+'%;background:var(--gold)&quot;></div></div><div class=&quot;subject-row-count&quot;>'+confCount.medium+'</div></div>'+
    '<div class=&quot;subject-row&quot;><div class=&quot;subject-row-name&quot;>🔴 Low</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:'+Math.round((confCount.low/totalConf)*100)+'%;background:var(--red)&quot;></div></div><div class=&quot;subject-row-count&quot;>'+confCount.low+'</div></div>';

  // 9. Insights
  const insights=[];
  if(logs.length>0){
    const weakSubj=SUBJECTS.reduce((a,b)=>subjCount[a].hrs<subjCount[b].hrs?a:b);
    insights.push('📉 <b>'+weakSubj+'</b> has the fewest hours logged so far. If mock results in this subject are also weak, prioritize it this week.');
  }
  if(weakEntries.length>0&amp;&amp;weakEntries[0].avg<60){
    insights.push('🎯 Your weakest mock-tested subject is <b>'+weakEntries[0].subj+'</b> at '+Math.round(weakEntries[0].avg)+'% accuracy. Revisit fundamentals before adding new topics there.');
  }
  const lowConfPct=Math.round((confCount.low/totalConf)*100);
  if(logs.length>5&amp;&amp;lowConfPct>30){
    insights.push('🔴 '+lowConfPct+'% of your sessions are tagged &quot;Low confidence.&quot; Consider slowing down and reinforcing those topics before moving on.');
  }
  const overdueCount=revs.filter(r=>!r.done&amp;&amp;r.nextRev<today()).length;
  if(overdueCount>5){
    insights.push('⏰ You have '+overdueCount+' overdue revisions piling up. Spaced repetition only works if you actually revisit on schedule — clear the backlog before adding new topics.');
  }
  insights.push('🧮 <b>The math of guessing:</b> with −0.66 negative marking on a 4-option question, blind guessing nets an expected score of ~0 — a coin flip against you. Eliminate 2 wrong options first, and the expected value of guessing between the remaining 2 turns clearly positive. Practice elimination, not luck.');
  insights.push('📰 Current affairs from the last 12 months typically drives the largest single chunk of Prelims questions. A monthly-compilation revision habit compounds far more than daily scrolling.');
  document.getElementById('analytics-insight').innerHTML='<div style=&quot;display:flex;flex-direction:column;gap:.6rem&quot;>'+insights.map(i=>'<div class=&quot;alert alert-info&quot; style=&quot;margin-bottom:0&quot;>'+i+'</div>').join('')+'</div>';
}

// ─── IMPORT / EXPORT ───
const BACKUP_KEYS=['logs','revs','mocks','ca','facts','ress','exam_date','daily_target'];
function exportData(){
  const data={};
  BACKUP_KEYS.forEach(k=>{data[k]=DB.get(k)});
  data._meta={app:'UPSC Prelims Command Centre',exportedOn:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='upsc_prelims_backup_'+today()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  document.getElementById('export-info').textContent='✓ Backup downloaded successfully';
}
function previewImport(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const parsed=JSON.parse(e.target.result);
      _importParsed=parsed;
      const counts=BACKUP_KEYS.filter(k=>k!=='exam_date'&amp;&amp;k!=='daily_target').map(k=>{
        const arr=parsed[k];
        return (Array.isArray(arr)?arr.length:0)+' '+k;
      }).join(', ');
      document.getElementById('import-preview-content').innerHTML='⚠️ <span>This file contains: <b>'+counts+'</b>. Choose how to import below.</span>';
      document.getElementById('import-preview').style.display='block';
      document.getElementById('import-result').textContent='';
    }catch(err){
      document.getElementById('import-result').innerHTML='<span style=&quot;color:var(--red)&quot;>❌ Invalid file. Please choose a valid backup .json file.</span>';
      document.getElementById('import-preview').style.display='none';
    }
  };
  reader.readAsText(file);
}
function cancelImport(){
  _importParsed=null;
  document.getElementById('import-preview').style.display='none';
  document.getElementById('import-file-input').value='';
}
function importData(mode){
  if(!_importParsed)return;
  if(mode==='replace'&amp;&amp;!confirm('This will REPLACE all your current data with the backup. This cannot be undone. Continue?'))return;
  BACKUP_KEYS.forEach(k=>{
    if(_importParsed[k]===undefined)return;
    if(k==='exam_date'||k==='daily_target'){
      if(mode==='replace'||!DB.get(k))DB.set(k,_importParsed[k]);
      return;
    }
    if(mode==='replace'){
      DB.set(k,_importParsed[k]);
    } else {
      const existing=DB.get(k)||[];
      const existingIds=new Set(existing.map(x=>x.id));
      const incoming=(_importParsed[k]||[]).filter(x=>!existingIds.has(x.id));
      DB.set(k,[...existing,...incoming]);
    }
  });
  document.getElementById('import-result').innerHTML='<span style=&quot;color:var(--green)&quot;>✓ Import successful ('+mode+'). Refreshing your data…</span>';
  cancelImport();
  loadExamDate();loadDailyTarget();
  renderDashboard();
  setTimeout(()=>{closeModal('modal-importexport')},1200);
}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
.modal-head{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:16px;font-weight:600;letter-spacing:-.02em}
.modal-body{padding:1.25rem 1.5rem}
.modal-foot{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.5rem}

/* ── MISC ── */
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px}
.row{display:flex;align-items:center;gap:.5rem}
.ml-auto{margin-left:auto}
.text-xs{font-size:11px}
.text-sm{font-size:13px}
.text-muted{color:var(--text2)}
.text-dim{color:var(--text3)}
.mb-05{margin-bottom:.5rem}
.mb-1{margin-bottom:1rem}
.mb-15{margin-bottom:1.5rem}
.mt-1{margin-top:1rem}
.mt-05{margin-top:.5rem}
.gap-1{gap:1rem}
.fw-500{font-weight:500}
.fw-600{font-weight:600}
.div{border-top:1px solid var(--border);margin:1rem 0}
.alert{padding:.75rem 1rem;border-radius:var(--radius2);font-size:13px;margin-bottom:.75rem;display:flex;align-items:flex-start;gap:.6rem;line-height:1.5}
.alert-warn{background:rgba(240,187,60,.07);border:1px solid rgba(240,187,60,.2);color:var(--gold)}
.alert-info{background:var(--accent-bg);border:1px solid rgba(124,109,250,.2);color:var(--accent2)}
.alert-green{background:var(--green-bg);border:1px solid rgba(52,211,153,.2);color:var(--green)}

/* ── ANALYTICS ── */
.subject-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.7rem}
.subject-row-name{font-size:12px;font-weight:600;width:90px;flex-shrink:0}
.subject-row-bar{flex:1;height:5px;background:var(--bg4);border-radius:99px;overflow:hidden}
.subject-row-fill{height:100%;border-radius:99px;transition:.5s ease}
.subject-row-count{font-size:11px;color:var(--text3);width:35px;text-align:right;flex-shrink:0}

/* ══════════════════════════════════════════
   POMODORO — compact mode (bottom-right)
══════════════════════════════════════════ */
#pomodoro{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius);padding:.8rem 1.1rem;
  display:flex;align-items:center;gap:.75rem;
  box-shadow:var(--shadow);
  transition:all .5s cubic-bezier(.34,1.56,.64,1);
  transform-origin:bottom right;
}
#pom-display{
  font-family:'JetBrains Mono',monospace;
  font-size:24px;font-weight:600;
  min-width:68px;
  transition:font-size .4s ease;
  letter-spacing:.02em;
}
#pom-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
#pom-subject-badge{font-size:10px;color:var(--text3);margin-top:2px}

/* ── FULLSCREEN TIMER ── */
#pomodoro.fullscreen{
  position:fixed;inset:0;
  border-radius:0;
  border:none;
  padding:0;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:2rem;
  background:var(--bg);
  box-shadow:none;
  z-index:1000;
  transform:none;
}
#pomodoro.fullscreen #pom-display{
  font-size:clamp(80px,18vw,160px);
  font-weight:700;
  color:var(--text);
  text-shadow:0 0 80px var(--accent-glow);
  min-width:unset;
  letter-spacing:.04em;
}
#pomodoro.fullscreen #pom-top{
  flex-direction:column;align-items:center;gap:.5rem
}
#pomodoro.fullscreen #pom-label{
  font-size:14px;letter-spacing:.2em;color:var(--text3)
}
#pomodoro.fullscreen #pom-subject-badge{
  font-size:16px;color:var(--accent2);font-weight:600;margin-top:0
}
#pomodoro.fullscreen #pom-controls{
  flex-direction:row;gap:1rem;
}
#pomodoro.fullscreen #pom-btn{
  font-size:18px;padding:14px 40px;border-radius:12px;
}
#pomodoro.fullscreen #pom-reset{
  font-size:15px;padding:12px 24px;
}
#pomodoro.fullscreen #pom-mode{
  font-size:14px;padding:10px 16px;
}
#pomodoro.fullscreen #pom-progress-ring{
  display:block;
}
#pomodoro.fullscreen #pom-close-fs{display:flex}

#pom-close-fs{
  display:none;
  position:absolute;top:1.5rem;right:1.5rem;
  padding:8px 16px;font-size:13px;
  color:var(--text3);border:1px solid var(--border);border-radius:var(--radius2);
  background:none;cursor:pointer;
  transition:.15s;
}
#pom-close-fs:hover{color:var(--text);background:var(--bg3)}

#pom-progress-ring{display:none;margin-bottom:1.5rem}
#pom-progress-ring circle.track{stroke:var(--bg4)}
#pom-progress-ring circle.progress{
  stroke:var(--accent);stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:50% 50%;
  transition:stroke-dashoffset 1s linear;
}

#pom-top{display:flex;flex-direction:column;gap:2px}
#pom-controls{display:flex;flex-direction:column;gap:5px}
#pom-mode{font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius3);padding:3px 6px;outline:none;cursor:pointer}
#pom-btn{transition:.15s}
#pom-reset{transition:.15s}

/* Active ring glow */
#pomodoro.running #pom-display{color:var(--accent2)}
#pomodoro.fullscreen.running #pom-progress-ring circle.progress{stroke:var(--accent)}
#pomodoro.fullscreen.break-mode #pom-progress-ring circle.progress{stroke:var(--green)}
#pomodoro.break-mode #pom-display{color:var(--green)}
#pomodoro.fullscreen.break-mode #pom-display{color:var(--green);text-shadow:0 0 80px rgba(52,211,153,.3)}

/* Finish flash */
@keyframes pomFinish{0%,100%{background:var(--bg)}50%{background:rgba(124,109,250,.08)}}
#pomodoro.fullscreen.done-flash{animation:pomFinish 1s ease 3}

/* ── DAILY TARGET RING ── */
.target-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.target-ring-wrap svg{filter:drop-shadow(0 0 6px var(--accent-glow))}

/* ── MOTIVATIONAL BANNER ── */
#motive-banner{
  background:linear-gradient(135deg,rgba(124,109,250,.08),rgba(240,187,60,.05));
  border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem 1.25rem;margin-bottom:1.25rem;
  display:flex;align-items:center;gap:1rem;
}
#motive-text{font-size:13px;color:var(--text2);line-height:1.6;flex:1}
#motive-meta{font-size:11px;color:var(--text3);margin-top:3px}

/* ── EXAM COUNTDOWN ── */
#exam-countdown{
  background:linear-gradient(135deg,rgba(124,109,250,.1),rgba(240,187,60,.08));
  border:1px solid var(--accent-glow);
  border-radius:var(--radius);padding:1rem 1.25rem;
  margin-bottom:1.25rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
}
.cd-block{text-align:center}
.cd-num{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--accent2);line-height:1}
.cd-unit{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-top:2px}
.cd-sep{font-size:22px;color:var(--border2);font-weight:300;margin-bottom:10px}

/* ── TOOLTIP ── */
.tip{position:relative}
.tip::after{content:attr(data-tip);position:absolute;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);background:#0a0d14;color:var(--text2);font-size:11px;padding:4px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:.15s;border:1px solid var(--border);z-index:999}
.tip:hover::after{opacity:1}

/* ── TOPIC TAG CHIPS ── */
.topic-chip{
  display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;
  background:var(--bg4);color:var(--text2);margin:2px;cursor:pointer;border:1px solid transparent;transition:.12s;
}
.topic-chip:hover{border-color:var(--accent);color:var(--accent2)}

/* ── TARGET HOURS ── */
#daily-target-bar{height:8px;background:var(--bg4);border-radius:99px;margin-top:8px;overflow:hidden}
#daily-target-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--teal));transition:.5s}

/* ── NOTES PAGE ── */
.note-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);
  padding:1rem;margin-bottom:.6rem;transition:.15s;
}
.note-card:hover{border-color:var(--border2);background:var(--bg3)}
.note-card textarea{background:transparent;border:none;color:var(--text);font-size:13px;line-height:1.65;width:100%;resize:vertical;outline:none;min-height:60px}

/* ── QUICK LOG BUTTONS ── */
.quick-log-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 10px;
  border-radius:var(--radius2);border:1px solid var(--border);background:var(--bg2);
  cursor:pointer;transition:.15s;min-width:70px;
}
.quick-log-btn:hover{border-color:var(--accent);background:var(--accent-bg)}
.quick-log-btn span{font-size:20px}
.quick-log-btn em{font-style:normal;font-size:11px;font-weight:600;color:var(--text2)}

/* ── GLOW DIVIDER ── */
.glow-div{height:1px;background:linear-gradient(90deg,transparent,var(--accent-glow),transparent);margin:1.5rem 0}

@media(max-width:768px){
  .g2,.g3,.g4{grid-template-columns:1fr}
  .nav-tabs{overflow-x:auto;gap:0;scrollbar-width:none}
  .nav-tabs::-webkit-scrollbar{display:none}
  .nav-date,.nav-streak{display:none}
  #pomodoro{bottom:.75rem;right:.75rem}
  .page{padding:1rem}
  #exam-countdown{flex-wrap:wrap;gap:.5rem}
  .cd-sep{display:none}
}
</style>
</head>

// ─── POMODORO ───
let pomTimer=null;let pomRunning=false;let pomTotalSeconds=25*60;let pomSeconds=25*60;
const CIRCUMFERENCE=2*Math.PI*96; // 603.2

function startPomAndExpand(){
  if(!pomRunning){togglePom();}
  expandTimer();
}

function expandTimer(){
  const el=document.getElementById('pomodoro');
  el.classList.add('fullscreen');
  document.getElementById('app-nav').classList.add('hidden-by-timer');
  document.body.style.overflow='hidden';
  updateRing();
}

function collapseTimer(){
  const el=document.getElementById('pomodoro');
  el.classList.remove('fullscreen');
  document.getElementById('app-nav').classList.remove('hidden-by-timer');
  document.body.style.overflow='';
}

function togglePom(){
  pomRunning=!pomRunning;
  const el=document.getElementById('pomodoro');
  const btn=document.getElementById('pom-btn');
  if(pomRunning){
    btn.textContent='⏸ Pause';
    el.classList.add('running');
    pomTimer=setInterval(tick,1000);
  } else {
    btn.textContent='▶ Resume';
    el.classList.remove('running');
    clearInterval(pomTimer);
  }
}

function tick(){
  pomSeconds--;
  updatePomDisplay();
  updateRing();
  if(pomSeconds<=0){
    clearInterval(pomTimer);
    pomRunning=false;
    document.getElementById('pom-btn').textContent='▶ Start';
    document.getElementById('pom-label').textContent='Done! ✓';
    document.getElementById('pomodoro').classList.remove('running');
    document.getElementById('pomodoro').classList.add('done-flash');
    setTimeout(()=>document.getElementById('pomodoro').classList.remove('done-flash'),3500);
    // Beep
    try{
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      [0,300,600].forEach(delay=>{
        const osc=ctx.createOscillator();const gain=ctx.createGain();
        osc.connect(gain);gain.connect(ctx.destination);
        osc.frequency.value=880;gain.gain.setValueAtTime(.3,ctx.currentTime+delay/1000);
        gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+delay/1000+.4);
        osc.start(ctx.currentTime+delay/1000);osc.stop(ctx.currentTime+delay/1000+.4);
      });
    }catch(e){}
  }
}

function resetPom(){
  clearInterval(pomTimer);pomRunning=false;
  const mins=parseInt(document.getElementById('pom-mode').value)||25;
  pomTotalSeconds=mins*60;pomSeconds=mins*60;
  document.getElementById('pom-btn').textContent='▶ Start';
  document.getElementById('pom-label').textContent='Focus';
  document.getElementById('pomodoro').classList.remove('running','break-mode');
  updatePomDisplay();updateRing();
}

function updatePomDisplay(){
  const m=Math.floor(pomSeconds/60),s=pomSeconds%60;
  const str=`${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('pom-display').textContent=str;
  document.title=pomRunning?`${str} – Studying`:'UPSC Mains';
}

function updateRing(){
  const ring=document.getElementById('pom-ring-progress');
  const pct=pomSeconds/pomTotalSeconds;
  ring.style.strokeDashoffset=CIRCUMFERENCE*(1-pct);
}

function saveRev(){

  const t=document.getElementById('rev-topic').value.trim();
  const d=document.getElementById('rev-date').value;
  const p=document.getElementById('rev-priority').value;
  const n=document.getElementById('rev-notes').value.trim();
  if(!t){alert('Enter a topic!');return}
  const revs=DB.revs();
  revs.push({id:Date.now().toString(),subject:s,topic:t,studyDate:d,nextRev:addDays(d,1),revCount:0,done:false,priority:p,notes:n});
  DB.set('revs',revs);
  closeModal('modal-rev');renderRevisions();
}
function markRev(id){
  const revs=DB.revs();
  const r=revs.find(x=>x.id===id);
  if(!r)return;
  // Save snapshot for undo
  r._undo={revCount:r.revCount||0,nextRev:r.nextRev,lastRev:r.lastRev||null,done:r.done||false};
  r.revCount=(r.revCount||0)+1;
  const nextDays=SPACED_REP_DAYS[Math.min(r.revCount,SPACED_REP_DAYS.length-1)];
  r.nextRev=addDays(today(),nextDays);
  r.lastRev=today();
  r.done=r.revCount>=SPACED_REP_DAYS.length;
  DB.set('revs',revs);
  renderRevisions();renderDashboard();
}
function undoMarkRev(id){
  const revs=DB.revs();
  const r=revs.find(x=>x.id===id);
  if(!r||!r._undo)return;
  r.revCount=r._undo.revCount;
  r.nextRev=r._undo.nextRev;
  r.lastRev=r._undo.lastRev;
  r.done=r._undo.done;
  delete r._undo;
  DB.set('revs',revs);
  renderRevisions();renderDashboard();
}
function editRevCount(id){
  const revs=DB.revs();
  const r=revs.find(x=>x.id===id);
  if(!r)return;
  const cur=r.revCount||0;
  const val=prompt(`Edit revision count for &quot;${r.topic}&quot;.\nCurrent: ${cur}\nEnter new count (0–${SPACED_REP_DAYS.length}):`,cur);
  if(val===null)return;
  const n=parseInt(val);
  if(isNaN(n)||n<0||n>SPACED_REP_DAYS.length){alert('Invalid count. Enter a number between 0 and '+SPACED_REP_DAYS.length);return;}
  r.revCount=n;
  r.done=n>=SPACED_REP_DAYS.length;
  const nextDays=SPACED_REP_DAYS[Math.min(Math.max(n,0),SPACED_REP_DAYS.length-1)];
  r.nextRev=addDays(today(),nextDays);
  delete r._undo;
  DB.set('revs',revs);
  renderRevisions();renderDashboard();
}
function deleteRev(id){
  if(!confirm('Delete this revision topic?'))return;
  DB.set('revs',DB.revs().filter(x=>x.id!==id));
  renderRevisions();
}

// ─── RENDER DASHBOARD ───
function renderDashboard(){
  const logs=DB.logs();const revs=DB.revs();
  const td=today();

  // Stats
  const days=new Set(logs.map(l=>l.date)).size;
  const hrs=logs.reduce((s,l)=>s+l.hours,0);
  const due=revs.filter(r=>!r.done&amp;&amp;r.nextRev<=td).length;
  document.getElementById('stat-days').textContent=days;
  document.getElementById('stat-sessions').textContent=logs.length;
  document.getElementById('stat-hours').textContent=Math.round(hrs*10)/10;
  document.getElementById('stat-revdue').textContent=due;
  const target=loadDailyTarget();
  const targetPct=Math.min(100,Math.round(((DB.get('daily_target')||8)/1000)*100));
  document.getElementById('stat-hours-sub').textContent=`${Math.round(hrs/10)*10}/1000h milestone`;

  // Daily target bar
  const todayHrs=logs.filter(l=>l.date===td).reduce((s,l)=>s+l.hours,0);
  const pct=Math.min(100,Math.round((todayHrs/target)*100));
  document.getElementById('daily-target-fill').style.width=pct+'%';
  document.getElementById('today-hours-text').textContent=`${todayHrs}h logged today`;
  document.getElementById('today-pct-text').textContent=`${pct}% of target`;

  // Greeting
  const hr=new Date().getHours();
  const greet=hr<12?'Good morning':'hr<17'?'Good afternoon':'Good evening';
  const g=hr<12?'Good morning ☀️':hr<17?'Good afternoon 🌤':hr<21?'Good evening 🌇':'Keep going 🌙';
  document.getElementById('dash-greeting').textContent=g+', Aspirant';

  // Date
  const now=new Date();
  document.getElementById('dash-date-line').textContent=now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('nav-date').textContent=now.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});

  // Streak
  let streak=0;let d=td;
  const logDates=new Set(logs.map(l=>l.date));
  while(logDates.has(d)){streak++;d=addDays(d,-1);}
  document.getElementById('streak-badge').textContent=`🔥 ${streak} day streak`;
  document.getElementById('nav-streak').textContent=`🔥 ${streak}`;

  // Alerts
  const alerts=document.getElementById('dash-alerts');alerts.innerHTML='';
  if(due>0)alerts.innerHTML+=`<div class=&quot;alert alert-warn&quot;>⚠️ <span>You have <b>${due}</b> topic(s) due for revision. <button class=&quot;btn btn-ghost btn-sm&quot; onclick=&quot;goTo('revisions')&quot; style=&quot;margin-left:4px&quot;>Go to Revisions →</button></span></div>`;
  const todayLogs=logs.filter(l=>l.date===td);
  if(todayLogs.length===0)alerts.innerHTML+=`<div class=&quot;alert alert-info&quot;>📚 <span>No sessions logged yet today. Keep your streak alive! <button class=&quot;btn btn-ghost btn-sm&quot; onclick=&quot;openLogModal()&quot; style=&quot;margin-left:4px&quot;>Log Now →</button></span></div>`;
  if(streak>=7)alerts.innerHTML+=`<div class=&quot;alert alert-green&quot;>🏆 <span>Incredible — <b>${streak}-day</b> study streak! You're on fire. Keep it up!</span></div>`;

  // Today sessions
  const ts=document.getElementById('today-sessions');
  const tl=logs.filter(l=>l.date===td).sort((a,b)=>a.subject.localeCompare(b.subject));
  if(tl.length===0)ts.innerHTML=`<div class=&quot;empty&quot;>No sessions today yet</div>`;
  else ts.innerHTML=tl.map(l=>`<div class=&quot;log-entry&quot;><div class=&quot;row mb-05&quot;><span class=&quot;badge ${SUBJ_COLOR[l.subject]}&quot;>${l.subject}</span><span class=&quot;text-xs text-dim&quot;>${l.hours}h</span><span class=&quot;badge ${l.conf==='high'?'badge-green':l.conf==='low'?'badge-red':'badge-gold'} text-xs&quot; style=&quot;margin-left:4px&quot;>${l.conf||'medium'}</span></div><div class=&quot;log-topic&quot;>${l.topic}</div>${l.notes?`<div class=&quot;log-note&quot;>${l.notes.slice(0,100)}${l.notes.length>100?'…':''}</div>`:''}</div>`).join('');

  // Due revisions (dashboard)
  const tr=document.getElementById('today-revisions');
  const dr=revs.filter(r=>!r.done&amp;&amp;r.nextRev<=td).slice(0,5);
  if(dr.length===0)tr.innerHTML=`<div class=&quot;empty&quot;>🎉 All caught up on revisions!</div>`;
  else tr.innerHTML=dr.map(r=>`<div class=&quot;rev-item&quot;><div class=&quot;rev-check ${r.nextRev<td?'due':''}&quot; onclick=&quot;markRev('${r.id}')&quot;>✓</div><div class=&quot;rev-content&quot;><div class=&quot;rev-topic&quot;>${r.topic}</div><div class=&quot;rev-sub&quot;><span class=&quot;badge ${SUBJ_COLOR[r.subject]}&quot;>${r.subject}</span> · Rev #${(r.revCount||0)+1}</div></div><div style=&quot;display:flex;flex-direction:column;align-items:flex-end;gap:4px&quot;><div class=&quot;rev-date ${r.nextRev<td?'overdue':'today'}&quot;>${r.nextRev<td?'Overdue':'Today'}</div>${r._undo!==undefined?`<button class=&quot;btn btn-xs btn-ghost&quot; onclick=&quot;undoMarkRev('${r.id}')&quot; style=&quot;color:var(--gold);border-color:var(--gold-glow);font-size:10px&quot;>↩ Undo</button>`:''}</div></div>`).join('');

  // Subject coverage this week
  const ws=weekStart();
  const wl=logs.filter(l=>l.date>=ws);
  const weekTotal=wl.reduce((s,l)=>s+l.hours,0);
  document.getElementById('week-hours-total').textContent=`${Math.round(weekTotal*10)/10}h this week`;
  const cov=document.getElementById('dash-coverage');
  const subjHrs={};SUBJECTS.forEach(s=>subjHrs[s]=0);
  wl.forEach(l=>subjHrs[l.subject]=(subjHrs[l.subject]||0)+l.hours);
  const maxH=Math.max(...Object.values(subjHrs),1);
  cov.innerHTML=`<div style=&quot;display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem&quot;>${SUBJECTS.map(s=>`<div><div class=&quot;row mb-05&quot;><span class=&quot;text-xs fw-600&quot; style=&quot;color:${SUBJ_HEX[s]}&quot;>${s}</span><span class=&quot;text-xs text-dim ml-auto&quot;>${subjHrs[s]||0}h</span></div><div class=&quot;prog-bar&quot;><div class=&quot;prog-fill&quot; style=&quot;width:${Math.round(((subjHrs[s]||0)/maxH)*100)}%;background:${SUBJ_HEX[s]}&quot;></div></div></div>`).join('')}</div>`;

  renderHeatmap();

  // Quote of day
  const essays=DB.essays().filter(e=>e.type==='Quote'||e.type==='Intellectual Line');
  if(essays.length>0){
    const q=essays[Math.floor((new Date().getDate())%essays.length)];
    document.getElementById('qotd-text').textContent=q.content;
    document.getElementById('qotd-meta').textContent=(q.author?'— '+q.author+' · ':'')+q.type+(q.tags&amp;&amp;q.tags.length?' · '+q.tags.join(', '):'');
  }
}

function renderHeatmap(){
  const logs=DB.logs();
  const dateCount={};
  logs.forEach(l=>dateCount[l.date]=(dateCount[l.date]||0)+1);
  const hm=document.getElementById('heatmap');
  const weeks=15;const cells=weeks*7;
  const start=new Date();start.setDate(start.getDate()-(cells-1));
  let html='<div class=&quot;heatmap-grid&quot;>';
  for(let i=0;i<cells;i++){
    const d=new Date(start);d.setDate(d.getDate()+i);
    const key=d.toISOString().slice(0,10);
    const cnt=dateCount[key]||0;
    const lvl=cnt===0?0:cnt===1?1:cnt<=2?2:cnt<=4?3:4;
    const label=`${key}: ${cnt} session${cnt!==1?'s':''}`;
    html+=`<div class=&quot;hm-cell hm-${lvl}&quot; title=&quot;${label}&quot;></div>`;
  }
  html+='</div>';
  hm.innerHTML=html;
}

// ─── RENDER LOG ───
function renderLog(){
  buildSubjPills('log-filter-pills',logSubjFilter,v=>{logSubjFilter=v;renderLog()});
  let logs=DB.logs();
  if(logSubjFilter!=='all')logs=logs.filter(l=>l.subject===logSubjFilter);
  const df=document.getElementById('log-date-filter').value;
  const cf=document.getElementById('log-conf-filter').value;
  const td=today();const ws=weekStart();const ms=td.slice(0,8)+'01';
  if(df==='today')logs=logs.filter(l=>l.date===td);
  else if(df==='week')logs=logs.filter(l=>l.date>=ws);
  else if(df==='month')logs=logs.filter(l=>l.date>=ms);
  if(cf!=='all')logs=logs.filter(l=>(l.conf||'medium')===cf);
  logs.sort((a,b)=>b.date.localeCompare(a.date)||(a.subject.localeCompare(b.subject)));
  const totalH=logs.reduce((s,l)=>s+l.hours,0);
  document.getElementById('log-count').textContent=`${logs.length} sessions · ${Math.round(totalH*10)/10}h`;
  const el=document.getElementById('log-list');
  if(logs.length===0){el.innerHTML=`<div class=&quot;empty&quot;>No sessions found. Log your first session!</div>`;return}
  const groups={};logs.forEach(l=>{(groups[l.date]=groups[l.date]||[]).push(l)});
  el.innerHTML=Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date=>{

            <button class=&quot;btn-icon&quot; onclick=&quot;openLogModal('${l.id}')&quot; title=&quot;Edit&quot;>✎</button>
            <button class=&quot;btn-icon&quot; onclick=&quot;delLog('${l.id}')&quot; title=&quot;Delete&quot; style=&quot;color:var(--text3)&quot;>✕</button>

// ─── RENDER REVISIONS ───
function setRevTab(t){revTab=t;renderRevisions();}
function renderRevisions(){
  const td=today();
  let revs=DB.revs();
  if(revTab==='overdue')revs=revs.filter(r=>!r.done&amp;&amp;r.nextRev<td);
  else if(revTab==='today')revs=revs.filter(r=>!r.done&amp;&amp;r.nextRev===td);
  else if(revTab==='week')revs=revs.filter(r=>!r.done&amp;&amp;r.nextRev>=td&amp;&amp;r.nextRev<=addDays(td,7));
  else if(revTab==='done')revs=revs.filter(r=>r.done);
  else revs=revs.filter(r=>!r.done);
  revs.sort((a,b)=>a.nextRev.localeCompare(b.nextRev));
  ['all','overdue','today','week','done'].forEach(t=>{
    const el=document.getElementById('revtab-'+t);
    if(el){el.style.background=revTab===t?'var(--accent-bg)':'';el.style.color=revTab===t?'var(--accent2)':''}
  });
  const el=document.getElementById('rev-list');
  if(revs.length===0){el.innerHTML=`<div class=&quot;empty&quot;>No revision topics in this category.</div>`;return}
  el.innerHTML=revs.map(r=>{
    const isOver=!r.done&amp;&amp;r.nextRev<td;const isToday=!r.done&amp;&amp;r.nextRev===td;
    const dc=isOver?'overdue':isToday?'today':r.done?'done':'upcoming';
    const label=r.done?'✅ Mastered':isOver?`Overdue ${diffDays(r.nextRev,td)}d`:isToday?'Today':
      `Due in ${diffDays(td,r.nextRev)}d`;
    const pct=Math.min(100,Math.round(((r.revCount||0)/SPACED_REP_DAYS.length)*100));
    return `<div class=&quot;rev-item&quot;>
      <div class=&quot;rev-check ${r.done?'done':isOver||isToday?'due':''}&quot; onclick=&quot;markRev('${r.id}')&quot;>✓</div>
      <div class=&quot;rev-content&quot;>
        <div class=&quot;rev-topic&quot;>${r.topic}</div>
        <div class=&quot;rev-sub row&quot; style=&quot;gap:5px&quot;>
          <span class=&quot;badge ${SUBJ_COLOR[r.subject]}&quot;>${r.subject}</span>
          <span>Rev ${(r.revCount||0)+1}/${SPACED_REP_DAYS.length}</span>
          <span class=&quot;badge badge-${r.priority==='high'?'red':r.priority==='low'?'teal':'gold'}&quot;>${r.priority}</span>
        </div>
        ${r.notes?`<div class=&quot;log-note&quot; style=&quot;margin-top:4px&quot;>${r.notes}</div>`:''}
        <div class=&quot;prog-bar&quot; style=&quot;margin-top:5px&quot;><div class=&quot;prog-fill&quot; style=&quot;width:${pct}%&quot;></div></div>
      </div>
      <div style=&quot;display:flex;flex-direction:column;align-items:flex-end;gap:5px&quot;>
        <div class=&quot;rev-date ${dc}&quot;>${label}</div>
        <div style=&quot;display:flex;gap:3px&quot;>
          ${r._undo!==undefined?`<button class=&quot;btn btn-xs btn-ghost&quot; onclick=&quot;undoMarkRev('${r.id}')&quot; title=&quot;Undo last revision mark&quot; style=&quot;color:var(--gold);border-color:var(--gold-glow);font-size:10px&quot;>↩ Undo</button>`:''}
          <button class=&quot;btn-icon tip&quot; onclick=&quot;editRevCount('${r.id}')&quot; data-tip=&quot;Edit revision count&quot; style=&quot;font-size:12px;color:var(--text3)&quot;>✎</button>
          <button class=&quot;btn-icon&quot; onclick=&quot;deleteRev('${r.id}')&quot; style=&quot;font-size:12px;color:var(--text3)&quot;>✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── RENDER ANALYTICS ───
function renderAnalytics(){
  const logs=DB.logs();const ress=DB.ress();

  // Sessions per subject
  const sc={};SUBJECTS.forEach(s=>sc[s]=0);
  logs.forEach(l=>sc[l.subject]=(sc[l.subject]||0)+1);
  const maxS=Math.max(...Object.values(sc),1);
  document.getElementById('analytics-subj').innerHTML=SUBJECTS.map(s=>`<div class=&quot;subject-row&quot;>
    <div class=&quot;subject-row-name&quot;><span class=&quot;text-xs fw-600&quot; style=&quot;color:${SUBJ_HEX[s]}&quot;>${s}</span></div>
    <div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:${Math.round((sc[s]/maxS)*100)}%;background:${SUBJ_HEX[s]}&quot;></div></div>
    <div class=&quot;subject-row-count&quot;>${sc[s]}</div>
  </div>`).join('');

  // By day of week
  const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dc=Array(7).fill(0);
  logs.forEach(l=>{const d=new Date(l.date+'T00:00:00');dc[d.getDay()]+=l.hours;});
  const maxD=Math.max(...dc,1);
  document.getElementById('analytics-dow').innerHTML=dow.map((d,i)=>`<div class=&quot;subject-row&quot;>
    <div class=&quot;subject-row-name text-xs fw-600&quot;>${d}</div>
    <div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:${Math.round((dc[i]/maxD)*100)}%;background:var(--accent)&quot;></div></div>
    <div class=&quot;subject-row-count&quot;>${Math.round(dc[i]*10)/10}h</div>
  </div>`).join('');

  // Topic coverage
  const tc={};SUBJECTS.forEach(s=>tc[s]=new Set());
  logs.forEach(l=>tc[l.subject].add(l.topic.toLowerCase()));
  document.getElementById('analytics-topics').innerHTML=SUBJECTS.map(s=>`<div class=&quot;subject-row&quot;>
    <div class=&quot;subject-row-name&quot; style=&quot;color:${SUBJ_HEX[s]};font-size:12px;font-weight:600&quot;>${s}</div>
    <div style=&quot;flex:1;font-size:13px;font-weight:600&quot;>${tc[s].size} <span class=&quot;text-xs text-dim&quot;>topics</span></div>
  </div>`).join('');

  // Resource completion
  const rstat={};['Not Started','In Progress','Completed'].forEach(s=>rstat[s]=0);
  ress.forEach(r=>rstat[r.status]=(rstat[r.status]||0)+1);
  const totalR=ress.length||1;
  document.getElementById('analytics-res').innerHTML=Object.keys(rstat).map(s=>`<div class=&quot;subject-row&quot;>
    <div class=&quot;subject-row-name text-xs fw-600&quot;>${s}</div>
    <div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:${Math.round((rstat[s]/totalR)*100)}%;background:${s==='Completed'?'var(--green)':s==='In Progress'?'var(--orange)':'var(--bg4)'}&quot;></div></div>
    <div class=&quot;subject-row-count&quot;>${rstat[s]}</div>
  </div>`).join('');

  // Confidence breakdown
  const conf={low:0,medium:0,high:0};
  logs.forEach(l=>conf[l.conf||'medium']=(conf[l.conf||'medium']||0)+1);
  const maxC=Math.max(...Object.values(conf),1);
  document.getElementById('analytics-conf').innerHTML=`
    <div class=&quot;subject-row&quot;><div class=&quot;subject-row-name text-xs fw-600&quot; style=&quot;color:var(--red)&quot;>🔴 Low</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:${Math.round(conf.low/maxC*100)}%;background:var(--red)&quot;></div></div><div class=&quot;subject-row-count&quot;>${conf.low}</div></div>
    <div class=&quot;subject-row&quot;><div class=&quot;subject-row-name text-xs fw-600&quot; style=&quot;color:var(--gold)&quot;>🟡 Medium</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:${Math.round(conf.medium/maxC*100)}%;background:var(--gold)&quot;></div></div><div class=&quot;subject-row-count&quot;>${conf.medium}</div></div>
    <div class=&quot;subject-row&quot;><div class=&quot;subject-row-name text-xs fw-600&quot; style=&quot;color:var(--green)&quot;>🟢 High</div><div class=&quot;subject-row-bar&quot;><div class=&quot;subject-row-fill&quot; style=&quot;width:${Math.round(conf.high/maxC*100)}%;background:var(--green)&quot;></div></div><div class=&quot;subject-row-count&quot;>${conf.high}</div></div>
    <div class=&quot;text-xs text-dim&quot; style=&quot;margin-top:.5rem&quot;>Topics with low confidence need a revision priority boost.</div>
  `;

  // Insights
  const totalH=logs.reduce((s,l)=>s+l.hours,0);
  const studyDays=new Set(logs.map(l=>l.date)).size;
  const avgPerDay=studyDays>0?totalH/studyDays:0;
  const bestSubj=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0];
  const weakSubj=SUBJECTS.filter(s=>sc[s]<(bestSubj?bestSubj[1]/4:999));
  document.getElementById('analytics-insight').innerHTML=`
    <div class=&quot;g3&quot; style=&quot;gap:.75rem&quot;>
      <div class=&quot;stat-card&quot;><div class=&quot;stat-label&quot;>Avg per study day</div><div class=&quot;stat-val&quot; style=&quot;font-size:20px;color:var(--teal)&quot;>${Math.round(avgPerDay*10)/10}h</div></div>
      <div class=&quot;stat-card&quot;><div class=&quot;stat-label&quot;>Most studied</div><div class=&quot;stat-val&quot; style=&quot;font-size:16px;color:${bestSubj?SUBJ_HEX[bestSubj[0]]:'var(--text)'}&quot;>${bestSubj?bestSubj[0]:'–'}</div><div class=&quot;stat-sub&quot;>${bestSubj?bestSubj[1]+' sessions':''}</div></div>
      <div class=&quot;stat-card&quot;><div class=&quot;stat-label&quot;>Needs more focus</div><div class=&quot;stat-val&quot; style=&quot;font-size:14px;color:var(--red)&quot;>${weakSubj.length>0?weakSubj.slice(0,2).join(', '):'Balanced ✓'}</div></div>
    </div>
    <div class=&quot;glow-div&quot;></div>
    <div class=&quot;text-xs text-dim&quot; style=&quot;line-height:1.8&quot;>
      💡 <b>Target:</b> 8–10h/day in the final 3 months. Equal subject rotation is key — UPSC Mains has equal weightage across papers.<br>
      📝 <b>Essay &amp; GS-4</b> are highest-ROI — consistent writing practice separates toppers from the pack.<br>
      🔄 <b>Spaced repetition</b> matters more than passive re-reading. Keep your revision queue clear every day.
    </div>
  `;
}

// ─── UTILS ───
function buildSubjPills(containerId,active,onClick,includeGeneral=false){
  const el=document.getElementById(containerId);
  const allSubjs=includeGeneral?['all',...SUBJECTS,'General']:['all',...SUBJECTS];
  el.innerHTML=allSubjs.map(s=>{
    const color=s==='all'?'background:var(--bg3);color:var(--text2)':s==='General'?'background:var(--bg4);color:var(--text3)':'';
    const cls=s==='all'?'':SUBJ_COLOR[s]||'';
    return `<button class=&quot;subj-pill ${cls} ${s===active?'sel':''}&quot; style=&quot;${color}&quot; onclick=&quot;(${onClick.toString()})('${s}')&quot;>${s==='all'?'All':s}</button>`;
  }).join('');
}

// ─── IMPORT / EXPORT ───
let _importParsed = null;

function exportData(){
  const keys = ['logs','revs','ress','essays','exam_date','daily_target'];
  const snapshot = {version:2, exportedAt: new Date().toISOString(), data:{}};
  keys.forEach(k => { snapshot.data[k] = DB.get(k); });
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date().toISOString().slice(0,10);
  a.download = `upsc_mains_backup_${d}.json`;
  a.click();
  URL.revokeObjectURL(url);
  // Show summary
  const logs = DB.logs(), revs = DB.revs(), ress = DB.ress(), essays = DB.essays();
  document.getElementById('export-info').textContent =
    `✓ Exported: ${logs.length} sessions · ${revs.length} revisions · ${ress.length} resources · ${essays.length} essay entries`;
}

function previewImport(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if(!parsed.data) throw new Error('Invalid backup file format');
      _importParsed = parsed;
      const d = parsed.data;
      const logs = (d.logs||[]).length, revs = (d.revs||[]).length;
      const ress = (d.ress||[]).length, essays = (d.essays||[]).length;
      const exportedAt = parsed.exportedAt ? new Date(parsed.exportedAt).toLocaleString('en-IN') : 'Unknown';
      document.getElementById('import-preview-content').innerHTML =
        `<b>Backup from:</b> ${exportedAt}<br>
         <b>Contents:</b> ${logs} sessions · ${revs} revisions · ${ress} resources · ${essays} essay entries<br><br>
         <b>Merge</b> keeps your existing data and adds new items from the file.<br>
         <b>Replace</b> wipes current data and loads the backup completely.`;
      document.getElementById('import-preview').style.display = 'block';
      document.getElementById('import-result').textContent = '';
    } catch(err) {
      document.getElementById('import-result').style.color = 'var(--red)';
      document.getElementById('import-result').textContent = '✕ Invalid file: ' + err.message;
      document.getElementById('import-preview').style.display = 'none';
    }
  };
  reader.readAsText(file);
}

function importData(mode){
  if(!_importParsed) return;
  const d = _importParsed.data;
  const KEYS = ['logs','revs','ress','essays','exam_date','daily_target'];
  if(mode === 'replace'){
    if(!confirm('This will overwrite ALL your current data with the backup. Are you sure?')) return;
    KEYS.forEach(k => { if(d[k] !== undefined &amp;&amp; d[k] !== null) DB.set(k, d[k]); });
    document.getElementById('import-result').style.color = 'var(--green)';
    document.getElementById('import-result').textContent = '✓ Data replaced successfully! Refreshing…';
  } else {
    // Merge — combine arrays by id, settings take backup value only if not already set
    const arrKeys = ['logs','revs','ress','essays'];
    arrKeys.forEach(k => {
      const existing = DB.get(k) || [];
      const incoming = d[k] || [];
      const existingIds = new Set(existing.map(x => x.id));
      const merged = [...existing, ...incoming.filter(x => !existingIds.has(x.id))];
      DB.set(k, merged);
    });
    // Settings: only set if not already saved
    if(d.exam_date &amp;&amp; !DB.get('exam_date')) DB.set('exam_date', d.exam_date);
    if(d.daily_target &amp;&amp; !DB.get('daily_target')) DB.set('daily_target', d.daily_target);
    document.getElementById('import-result').style.color = 'var(--green)';
    document.getElementById('import-result').textContent = '✓ Data merged successfully! Refreshing…';
  }
  document.getElementById('import-preview').style.display = 'none';
  _importParsed = null;
  document.getElementById('import-file-input').value = '';
  setTimeout(() => { location.reload(); }, 1200);
}

function cancelImport(){
  _importParsed = null;
  document.getElementById('import-file-input').value = '';
  document.getElementById('import-preview').style.display = 'none';
  document.getElementById('import-result').textContent = '';
}

/* ── REVISION VIEW ── */

.fc-paper { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }

/* ── TARGETS VIEW ── */
.targets-area { flex: 1; overflow-y: auto; padding: 22px 28px; }

.target-save-btn { padding: 6px 14px; background: var(--accent); border: none; border-radius: var(--radius); color: #111; font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.target-save-btn:hover { opacity: 0.88; }
.target-progress-row { display: flex; align-items: center; gap: 10px; }
.target-track { flex: 1; height: 8px; background: var(--surface3); border-radius: 99px; overflow: hidden; }

.daily-goal-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.daily-goal-input { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 6px 10px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; width: 80px; }

.today-count { font-size: 13px; color: var(--muted); }
.today-count strong { color: var(--text); }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 16px; font-size: 13px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 999; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; }

/* ── ICON BTNS ── */
.icon-btn { padding: 6px 13px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--muted); font-family: var(--font); font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }

.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 24px 26px; max-width: 480px; width: 100%; box-shadow: 0 24px 64px rgba(0,0,0,0.5); }

.modal-btn { padding: 8px 18px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-family: var(--font); font-size: 13px; cursor: pointer; transition: all 0.15s; }
.modal-btn:hover { background: var(--surface3); }
.modal-btn.danger { background: var(--poor-bg); border-color: rgba(224,82,82,0.4); color: var(--poor); }

canvas { max-width: 100%; }

@media (max-width: 720px) {

}

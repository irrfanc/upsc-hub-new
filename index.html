<body>

<div class=&quot;topbar&quot;>
  <div class=&quot;brand&quot;>
    <span class=&quot;brand-title&quot;>StudyLog</span>
    <span class=&quot;brand-sub&quot;>UPSC Mains</span>
  </div>
  <div class=&quot;topbar-right&quot;>
    <div id=&quot;streak-display&quot;></div>
    <div class=&quot;topbar-stats&quot;>
      <div class=&quot;top-stat&quot;>
        <div class=&quot;top-stat-num&quot; id=&quot;global-total&quot;>0</div>
        <div class=&quot;top-stat-lbl&quot;>Written</div>
      </div>
      <div class=&quot;top-stat&quot;>
        <div class=&quot;top-stat-num&quot; id=&quot;global-target-display&quot;>1600</div>
        <div class=&quot;top-stat-lbl&quot;>Target</div>
      </div>
    </div>
    <button class=&quot;icon-btn&quot; onclick=&quot;exportData()&quot;>⬇ Export</button>
    <button class=&quot;icon-btn&quot; onclick=&quot;importTrigger()&quot;>⬆ Import</button>
    <input type=&quot;file&quot; id=&quot;import-file&quot; accept=&quot;.json&quot; style=&quot;display:none&quot; onchange=&quot;importData(event)&quot;>
  </div>
</div>

<div class=&quot;layout&quot;>
  <nav class=&quot;sidebar&quot; id=&quot;sidebar&quot;></nav>
  <div class=&quot;main&quot; id=&quot;main&quot;>
    <!-- Views rendered here -->
  </div>
</div>

<div class=&quot;toast&quot; id=&quot;toast&quot;></div>

<div class=&quot;modal-overlay&quot; id=&quot;del-modal&quot;>
  <div class=&quot;modal&quot;>
    <div class=&quot;modal-title&quot;>Remove question?</div>
    <div class=&quot;modal-body&quot; id=&quot;del-modal-body&quot;>This will permanently delete this question and its notes.</div>
    <div class=&quot;modal-actions&quot;>
      <button class=&quot;modal-btn&quot; onclick=&quot;closeDelModal()&quot;>Cancel</button>
      <button class=&quot;modal-btn danger&quot; onclick=&quot;confirmDel()&quot;>Remove</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───
const PAPERS = [
  { id: 'gs1',   label: 'GS Paper 1',      short: 'GS-I',    target: 300, group: 'General Studies' },
  { id: 'gs2',   label: 'GS Paper 2',      short: 'GS-II',   target: 300, group: 'General Studies' },
  { id: 'gs3',   label: 'GS Paper 3',      short: 'GS-III',  target: 300, group: 'General Studies' },
  { id: 'gs4',   label: 'GS Paper 4',      short: 'GS-IV',   target: 300, group: 'General Studies' },
  { id: 'anth1', label: 'Anthropology P1', short: 'Anth-I',  target: 250, group: 'Anthropology' },
  { id: 'anth2', label: 'Anthropology P2', short: 'Anth-II', target: 250, group: 'Anthropology' },
];

const TOPICS = {
  gs1: ['History','Geography','Art &amp; Culture','Society','Post Independence'],
  gs2: ['Governance','Polity &amp; Constitution','Social Justice','IR','Schemes'],
  gs3: ['Economy','Environment','Science &amp; Tech','Security','Disaster Mgmt'],
  gs4: ['Ethics','Attitude','Aptitude','Case Studies','Thinkers'],
  anth1: ['Evolution','Social Anthropology','Kinship','Religion','Political'],
  anth2: ['Applied','Indian Society','Tribes','Research Methods','Misc'],
};

const STORAGE_KEY = 'upsc_studylog_v3';
let data = {};
let meta = { targets: {}, dailyGoal: 10, activeDays: {} };
let activePaper = 'gs1';
let activeView = 'paper'; // paper | dashboard | revision | targets
let filterRating = 'All';
let filterStarred = false;
let searchQuery = '';
let sortOrder = 'newest';
let selectedRating = 'Good';
let selectedTopic = '';
let revMode = 'poor';  // poor | starred | all
let revIdx = 0;
let revList = [];
let revShowAnswer = false;
let pendingDelPaper = null;
let pendingDelIdx = null;

function load() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const parsed = JSON.parse(s);
      data = parsed.data || parsed; // compat with v2
      meta = parsed.meta || meta;
    }
  } catch(e) {}
  PAPERS.forEach(p => {
    if (!data[p.id]) data[p.id] = [];
    if (!meta.targets[p.id]) meta.targets[p.id] = p.target;
  });
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ data, meta })); } catch(e) {}
}

// ─── TOAST ───
function toast(msg, dur=2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ─── STREAK ───
function getStreak() {
  const days = Object.keys(meta.activeDays || {}).sort().reverse();
  if (!days.length) return 0;
  const today = isoDay(new Date());
  let streak = 0;
  let d = new Date();
  while (true) {
    const k = isoDay(d);
    if (meta.activeDays[k]) { streak++; d.setDate(d.getDate()-1); }
    else if (k === today) { d.setDate(d.getDate()-1); } // today not yet logged
    else break;
    if (streak > 365) break;
  }
  return streak;
}
function isoDay(d) { return d.toISOString().slice(0,10); }
function markActiveDay() {
  if (!meta.activeDays) meta.activeDays = {};
  meta.activeDays[isoDay(new Date())] = true;
}

// ─── EXPORT / IMPORT ───
function exportData() {
  const blob = new Blob([JSON.stringify({data, meta}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'upsc_tracker_backup.json';
  a.click();
  toast('Exported ✓');
}
function importTrigger() { document.getElementById('import-file').click(); }
function importData(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      data = d.data || d;
      meta = d.meta || meta;
      PAPERS.forEach(p => { if (!data[p.id]) data[p.id] = []; if (!meta.targets[p.id]) meta.targets[p.id] = p.target; });
      save(); render(); toast('Imported ✓');
    } catch(err) { toast('Invalid file'); }
  };
  r.readAsText(f);
  e.target.value = '';
}

// ─── GLOBAL STATS ───
function globalTotal() { return PAPERS.reduce((s,p)=>s+data[p.id].length, 0); }
function globalTarget() { return PAPERS.reduce((s,p)=>s+(meta.targets[p.id]||p.target), 0); }
function todayCount() {
  const t = isoDay(new Date());
  return PAPERS.reduce((s,p)=>s+data[p.id].filter(q=>q.date===t).length, 0);
}

// ─── SIDEBAR ───
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  // Special views
  html += `<div class=&quot;sidebar-section-label&quot;>Overview</div>`;
  html += navItem('dashboard','📊','Dashboard','',activeView==='dashboard');
  html += navItem('revision','🔁','Revision Mode','',activeView==='revision');
  html += navItem('targets','🎯','Targets','',activeView==='targets');
  html += `<hr class=&quot;nav-divider&quot;>`;

  let lastGroup = null;
  PAPERS.forEach(p => {
    if (p.group !== lastGroup) { html += `<div class=&quot;sidebar-section-label&quot;>${p.group}</div>`; lastGroup = p.group; }
    const cnt = data[p.id].length;
    const tgt = meta.targets[p.id] || p.target;
    const pct = Math.min(100, Math.round(cnt/tgt*100));
    const isActive = activeView==='paper' &amp;&amp; p.id===activePaper;
    html += `<div class=&quot;nav-item${isActive?' active':''}&quot; onclick=&quot;switchPaper('${p.id}')&quot;>
      <div class=&quot;nav-item-left&quot;><div class=&quot;nav-dot&quot;></div><span class=&quot;nav-label&quot;>${p.short}</span></div>
      <span class=&quot;nav-count&quot;>${cnt}</span>
    </div>
    <div class=&quot;sidebar-progress&quot;><div class=&quot;sp-bar&quot;><div class=&quot;sp-fill&quot; style=&quot;width:${pct}%&quot;></div></div></div>`;
  });
  sb.innerHTML = html;
}
function navItem(view, icon, label, count, isActive) {
  return `<div class=&quot;nav-item special${isActive?' active':''}&quot; onclick=&quot;switchView('${view}')&quot;>
    <div class=&quot;nav-item-left&quot;><div class=&quot;nav-dot&quot;></div><span class=&quot;nav-label&quot;>${icon} ${label}</span></div>
    ${count ? `<span class=&quot;nav-count&quot;>${count}</span>` : ''}
  </div>`;
}

// ─── RENDER DISPATCH ───
function render() {
  renderSidebar();
  renderTopbar();
  if (activeView === 'paper') renderPaperView();
  else if (activeView === 'dashboard') renderDashboard();
  else if (activeView === 'revision') renderRevision();
  else if (activeView === 'targets') renderTargets();
}

function renderTopbar() {
  const streak = getStreak();
  document.getElementById('global-total').textContent = globalTotal();
  document.getElementById('global-target-display').textContent = globalTarget();
  const sd = document.getElementById('streak-display');
  if (streak >= 1) {
    sd.innerHTML = `<div class=&quot;streak-pill&quot;>🔥 ${streak} day${streak>1?'s':''} streak</div>`;

}

function switchPaper(id) {
  activePaper = id; activeView = 'paper';

function switchView(v) {

// ─── PAPER VIEW ───
function renderPaperView() {
  const paper = PAPERS.find(p=>p.id===activePaper);
  const qs = data[activePaper];
  const done = qs.length;
  const tgt = meta.targets[activePaper] || paper.target;
  const pct = Math.min(100, Math.round(done/tgt*100));
  const poor = qs.filter(q=>q.rating==='Poor').length;
  const ok   = qs.filter(q=>q.rating==='OK').length;
  const good = qs.filter(q=>q.rating==='Good').length;
  const starred = qs.filter(q=>q.starred).length;
  const today = isoDay(new Date());
  const topics = TOPICS[activePaper] || [];

  let filtered = qs.filter(q => {
    const matchR = filterRating==='All' || q.rating===filterRating;
    const matchS = !filterStarred || q.starred;
    const matchQ = !searchQuery || q.q.toLowerCase().includes(searchQuery.toLowerCase()) || (q.source||'').toLowerCase().includes(searchQuery.toLowerCase()) || (q.topic||'').toLowerCase().includes(searchQuery.toLowerCase());
    const matchT = !selectedTopic || q.topic===selectedTopic;
    return matchR &amp;&amp; matchS &amp;&amp; matchQ &amp;&amp; matchT;

  if (sortOrder === 'newest') filtered = [...filtered].reverse();
  else if (sortOrder === 'oldest') { /* keep as-is */ }
  else if (sortOrder === 'rating') filtered = [...filtered].sort((a,b)=>(['Poor','OK','Good'].indexOf(a.rating)-['Poor','OK','Good'].indexOf(b.rating)));
  else if (sortOrder === 'starred') filtered = [...filtered].sort((a,b)=>(b.starred?1:0)-(a.starred?1:0));

    : filtered.map(q => {
        const realIdx = qs.indexOf(q);

        return `<div class=&quot;q-card${q.starred?' starred-card':''}&quot; id=&quot;qcard-${realIdx}&quot;>
          <div class=&quot;q-card-main&quot; onclick=&quot;toggleNote(${realIdx})&quot;>
            <div class=&quot;q-idx&quot;>#${realIdx+1}</div>

          <select class=&quot;small&quot; id=&quot;q-topic&quot; onchange=&quot;selectedTopic=''&quot;>

// ─── PAPER ACTIONS ───
function setRating(r) {
  selectedRating = r;
  const btns = document.querySelectorAll('#rating-toggle button');
  btns.forEach(b => b.className = b.textContent===r ? `sel-${r}` : '');
}
function setFilter(r) { filterRating=r; renderPaperView(); }
function toggleFilterStarred() { filterStarred=!filterStarred; renderPaperView(); }
function setSearch(v) { searchQuery=v; renderPaperView(); }

function addQ() {
  const txt = document.getElementById('q-input').value.trim();
  if (!txt) { document.getElementById('q-input').focus(); return; }
  const src   = document.getElementById('q-source').value.trim();
  const topic = document.getElementById('q-topic').value;
  const words = parseInt(document.getElementById('q-words').value)||0;
  const dt    = document.getElementById('q-date').value;
  data[activePaper].push({
    q: txt, source: src||'General', topic: topic||'',
    date: dt||isoDay(new Date()), rating: selectedRating,
    notes: '', starred: false, attempts: 1,
    wordCount: words||0, _open: false
  });
  markActiveDay();
  save();
  document.getElementById('q-input').value = '';
  document.getElementById('q-words').value = '';
  toast('Question added ✓');
  filterRating='All'; filterStarred=false; searchQuery=''; sortOrder='newest';
  render();
  document.getElementById('q-input').focus();
}

function cycleRating(idx) {
  const map = {Poor:'OK',OK:'Good',Good:'Poor'};
  data[activePaper][idx].rating = map[data[activePaper][idx].rating];
  save(); renderPaperView();
}
function toggleStar(idx) {
  data[activePaper][idx].starred = !data[activePaper][idx].starred;
  save(); renderPaperView();
}
function toggleNote(idx) {
  data[activePaper][idx]._open = !data[activePaper][idx]._open;
  save(); renderPaperView();
}
function saveNote(idx, val) {
  data[activePaper][idx].notes = val; save();
}
function setAttempts(idx, n) {
  data[activePaper][idx].attempts = n; save(); renderPaperView();
}

// ─── DELETE MODAL ───
function openDelModal(paper, idx) {
  pendingDelPaper=paper; pendingDelIdx=idx;
  document.getElementById('del-modal-body').textContent = `Remove question #${idx+1}? This cannot be undone.`;
  document.getElementById('del-modal').classList.add('open');
}
function closeDelModal() {
  document.getElementById('del-modal').classList.remove('open');
  pendingDelPaper=null; pendingDelIdx=null;
}
function confirmDel() {
  if (pendingDelPaper===null) return;
  data[pendingDelPaper].splice(pendingDelIdx,1);
  save(); closeDelModal(); toast('Question removed'); render();
}
document.getElementById('del-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeDelModal(); });

function buildHeatmap() {
  const today = new Date();
  // Build 12 weeks × 7 days grid
  const cells = {};
  PAPERS.forEach(p=>data[p.id].forEach(q=>{ cells[q.date]=(cells[q.date]||0)+1; }));
  const maxDay = Math.max(1,...Object.values(cells));

  // Start from 84 days ago, align to Sunday
  const start = new Date(today);
  start.setDate(start.getDate()-83);
  // find previous Sunday
  while(start.getDay()!==0) start.setDate(start.getDate()-1);

  let weeks = [];
  let d = new Date(start);
  for(let w=0;w<12;w++) {
    let week = [];
    for(let day=0;day<7;day++) {
      const k = isoDay(d);
      const cnt = cells[k]||0;
      const lvl = cnt===0?0:cnt<3?1:cnt<6?2:cnt<10?3:4;
      week.push({k,cnt,lvl,future:d>today});
      d.setDate(d.getDate()+1);
    }
    weeks.push(week);
  }

  const dayLabels = ['S','M','T','W','T','F','S'];
  let html = '<div style=&quot;display:flex;gap:4px&quot;>';
  html += '<div style=&quot;display:flex;flex-direction:column;gap:3px;padding-top:2px&quot;>';
  dayLabels.forEach(l=>{ html+=`<div style=&quot;font-size:10px;color:var(--faint);height:14px;line-height:14px;text-align:right;padding-right:4px&quot;>${l}</div>`; });
  html += '</div><div style=&quot;display:flex;flex-direction:column;gap:3px&quot;>';
  // month labels row
  html += '<div style=&quot;display:flex;gap:3px;margin-bottom:1px&quot;>';
  weeks.forEach((wk,wi)=>{
    const firstOfMonth = wk.find(c=>c.k.slice(8)==='01');
    const monthName = firstOfMonth ? new Date(firstOfMonth.k).toLocaleString('en',{month:'short'}) : '';
    html+=`<div style=&quot;width:14px;font-size:9px;color:var(--faint);overflow:visible;white-space:nowrap&quot;>${monthName}</div>`;
  });
  html += '</div>';
  // cells grid (day rows, not week columns)
  for(let day=0;day<7;day++) {
    html += '<div style=&quot;display:flex;gap:3px&quot;>';
    weeks.forEach(wk=>{
      const c=wk[day];
      const cls=c.future?'':c.lvl===0?'':'h'+c.lvl;
      const style=c.future?'opacity:0.2':'';
      html+=`<div class=&quot;h-cell ${cls}&quot; style=&quot;${style}&quot; title=&quot;${c.k}: ${c.cnt} q&quot;></div>`;
    });
    html += '</div>';
  }
  html += '</div></div>';
  html += `<div style=&quot;font-size:11px;color:var(--faint);margin-top:8px;display:flex;align-items:center;gap:6px&quot;>Less <div class=&quot;h-cell&quot;></div><div class=&quot;h-cell h1&quot;></div><div class=&quot;h-cell h2&quot;></div><div class=&quot;h-cell h3&quot;></div><div class=&quot;h-cell h4&quot;></div> More</div>`;
  return html;
}

// ─── REVISION VIEW ───
function buildRevList() {
  const allQ = PAPERS.flatMap(p=>data[p.id].map((q,i)=>({...q,_paper:p,_idx:i})));
  if (revMode==='poor') revList = allQ.filter(q=>q.rating==='Poor');
  else if (revMode==='starred') revList = allQ.filter(q=>q.starred);
  else revList = allQ;
  // shuffle
  for(let i=revList.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [revList[i],revList[j]]=[revList[j],revList[i]];
  }
  revIdx=0; revShowAnswer=false;
}

function renderRevision() {
  const allQ = PAPERS.flatMap(p=>data[p.id]);
  const poorCount = allQ.filter(q=>q.rating==='Poor').length;
  const starCount = allQ.filter(q=>q.starred).length;

  let cardHTML = '';
  if (revList.length===0) {
    cardHTML = `<div class=&quot;empty&quot;><div class=&quot;empty-icon&quot;>✅</div><div class=&quot;empty-title&quot;>No questions in this set</div><div class=&quot;empty-sub&quot;>Add questions or change the filter above.</div></div>`;
  } else {
    const q = revList[revIdx];
    cardHTML = `
    <div class=&quot;flashcard-wrap&quot;>
      <div class=&quot;flashcard&quot; onclick=&quot;revFlip()&quot;>
        <div class=&quot;fc-paper&quot;>${q._paper.short} · ${q.topic||q.source||'General'}</div>
        <div class=&quot;fc-q&quot;>${escHtml(q.q)}</div>
        ${!revShowAnswer
          ? `<div class=&quot;fc-hint&quot;>Click to see your notes / self-evaluation</div>`
          : q.notes
            ? `<div class=&quot;fc-notes&quot;>${escHtml(q.notes)}</div>`
            : `<div class=&quot;fc-hint&quot; style=&quot;color:var(--muted)&quot;>No notes saved for this question.</div>`
        }
      </div>
      ${revShowAnswer ? `
      <div class=&quot;fc-controls&quot;>
        <button class=&quot;fc-btn poor&quot; onclick=&quot;revRate('Poor')&quot;>Poor — retry</button>
        <button class=&quot;fc-btn ok&quot; onclick=&quot;revRate('OK')&quot;>OK</button>
        <button class=&quot;fc-btn good&quot; onclick=&quot;revRate('Good')&quot;>Good ✓</button>
        <button class=&quot;fc-btn&quot; onclick=&quot;revSkip()&quot;>Skip →</button>
      </div>` : `
      <div class=&quot;fc-controls&quot;>
        <button class=&quot;fc-btn&quot; onclick=&quot;revFlip()&quot;>Reveal Notes</button>
        <button class=&quot;fc-btn&quot; onclick=&quot;revSkip()&quot;>Skip →</button>
      </div>`}
      <div class=&quot;fc-progress&quot;><span class=&quot;fc-counter&quot;>${revIdx+1} / ${revList.length}</span> · Rating: <span class=&quot;rb-${q.rating}&quot; style=&quot;font-weight:600;color:var(--${q.rating==='Poor'?'poor':q.rating==='OK'?'ok':'good'})&quot;>${q.rating}</span></div>
    </div>`;
  }

  document.getElementById('main').innerHTML = `
  <div style=&quot;display:flex;flex-direction:column;flex:1;overflow:hidden&quot;>
    <div style=&quot;padding:18px 26px 14px;border-bottom:1px solid var(--border);flex-shrink:0&quot;>
      <div style=&quot;font-family:var(--display);font-size:21px;color:var(--text);margin-bottom:2px&quot;>Revision Mode</div>
      <div style=&quot;font-size:12px;color:var(--muted)&quot;>Flashcard-style practice to reinforce your answers</div>
    </div>
    <div class=&quot;revision-area&quot;>
      <div class=&quot;rev-mode-bar&quot;>
        <button class=&quot;rev-mode-btn${revMode==='poor'?' active':''}&quot; onclick=&quot;setRevMode('poor')&quot;>⚠️ Needs Work (${poorCount})</button>
        <button class=&quot;rev-mode-btn${revMode==='starred'?' active':''}&quot; onclick=&quot;setRevMode('starred')&quot;>★ Starred (${starCount})</button>
        <button class=&quot;rev-mode-btn${revMode==='all'?' active':''}&quot; onclick=&quot;setRevMode('all')&quot;>All Questions</button>
        <button class=&quot;rev-mode-btn&quot; onclick=&quot;buildRevList();renderRevision()&quot; style=&quot;margin-left:8px&quot;>🔀 Reshuffle</button>
      </div>
      ${cardHTML}
    </div>
  </div>`;
}
function setRevMode(m) { revMode=m; buildRevList(); renderRevision(); }
function revFlip() { revShowAnswer=!revShowAnswer; renderRevision(); }
function revSkip() { revIdx=(revIdx+1)%revList.length; revShowAnswer=false; renderRevision(); }
function revRate(r) {
  const q = revList[revIdx];
  data[q._paper.id][q._idx].rating = r;
  save();
  revIdx=(revIdx+1)%revList.length;
  revShowAnswer=false;
  renderRevision();
  toast(`Marked ${r}`);
}

// ─── TARGETS VIEW ───
function renderTargets() {
  const todayCnt = todayCount();
  const dg = meta.dailyGoal||10;
  document.getElementById('main').innerHTML = `
  <div style=&quot;display:flex;flex-direction:column;flex:1;overflow:hidden&quot;>
    <div style=&quot;padding:18px 26px 14px;border-bottom:1px solid var(--border);flex-shrink:0&quot;>
      <div style=&quot;font-family:var(--display);font-size:21px;color:var(--text);margin-bottom:2px&quot;>Targets &amp; Goals</div>
      <div style=&quot;font-size:12px;color:var(--muted)&quot;>Customise per-paper targets and daily writing goals</div>
    </div>
    <div class=&quot;targets-area&quot;>
      <div class=&quot;daily-goal-wrap&quot;>
        <div class=&quot;daily-goal-header&quot;>
          <div class=&quot;daily-goal-title&quot;>📅 Daily Writing Goal</div>
          <div style=&quot;font-size:12px;color:var(--muted)&quot;>Today: <strong style=&quot;color:var(--text)&quot;>${todayCnt}</strong> questions written</div>
        </div>
        <div class=&quot;daily-goal-row&quot;>
          <label style=&quot;font-size:13px;color:var(--muted)&quot;>Target per day:</label>
          <input type=&quot;number&quot; class=&quot;daily-goal-input&quot; id=&quot;daily-goal-input&quot; value=&quot;${dg}&quot; min=&quot;1&quot; max=&quot;100&quot;>
          <button class=&quot;target-save-btn&quot; onclick=&quot;saveDailyGoal()&quot;>Save</button>
          <div style=&quot;font-size:12px;color:var(--faint)&quot;>${todayCnt>=dg?'✅ Goal reached today!':'⏳ '+Math.max(0,dg-todayCnt)+' more to go'}</div>
        </div>
      </div>

      <div class=&quot;section-heading&quot; style=&quot;margin-bottom:14px&quot;>Paper Targets</div>
      <div class=&quot;target-cards&quot;>
        ${PAPERS.map(p=>{
          const cnt = data[p.id].length;
          const tgt = meta.targets[p.id]||p.target;
          const pp = Math.min(100,Math.round(cnt/tgt*100));
          return `<div class=&quot;target-card&quot;>
            <div class=&quot;target-card-header&quot;>
              <div class=&quot;target-paper-name&quot;>${p.label}</div>
              <div class=&quot;target-badge&quot;>${cnt} written</div>
            </div>
            <div class=&quot;target-edit-row&quot;>
              <label style=&quot;font-size:13px;color:var(--muted)&quot;>Target:</label>
              <input type=&quot;number&quot; class=&quot;target-input&quot; id=&quot;tgt-${p.id}&quot; value=&quot;${tgt}&quot; min=&quot;1&quot;>
              <button class=&quot;target-save-btn&quot; onclick=&quot;saveTarget('${p.id}')&quot;>Save</button>
            </div>
            <div class=&quot;target-progress-row&quot;>
              <div class=&quot;target-track&quot;><div class=&quot;target-fill&quot; style=&quot;width:${pp}%&quot;></div></div>
              <div class=&quot;target-pct&quot;>${pp}%</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}
function saveTarget(id) {
  const v = parseInt(document.getElementById('tgt-'+id).value);
  if (v>0) { meta.targets[id]=v; save(); render(); toast('Target updated ✓'); }
}
function saveDailyGoal() {
  const v = parseInt(document.getElementById('daily-goal-input').value);
  if (v>0) { meta.dailyGoal=v; save(); render(); toast('Daily goal updated ✓'); }
}

// ─── UTILITIES ───
function escHtml(s) {
  return String(s||'').replace(/&amp;/g,'&amp;amp;').replace(/</g,'&amp;lt;').replace(/>/g,'&amp;gt;').replace(/&quot;/g,'&amp;quot;');
}

// ─── BOOT ───
load(); render();
</script>
</body>
</html>
">
  </iframe>
</div>

<script>
const tabs = document.querySelectorAll('.hub-tab');
const frames = document.querySelectorAll('.app-frame');
const loaded = {};

// Hide loading spinner when iframe loads
document.querySelectorAll('.app-frame').forEach(iframe => {
  iframe.addEventListener('load', () => {
    const app = iframe.dataset.app;
    loaded[app] = true;
    const loading = document.getElementById('loading-' + app);
    if (loading) loading.classList.add('hidden');
  });
});

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const app = tab.dataset.app;

    // Update tabs
    tabs.forEach(t => t.classList.toggle('active', t === tab));

    // Update frames
    frames.forEach(f => {
      const isActive = f.dataset.app === app;
      f.classList.toggle('active', isActive);
    });

    // Show/hide loaders
    document.querySelectorAll('.frame-loading').forEach(l => {
      const lApp = l.id.replace('loading-', '');
      if (lApp === app && !loaded[app]) {
        l.classList.remove('hidden');
      } else {
        l.classList.add('hidden');
      }
    });
  });
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
